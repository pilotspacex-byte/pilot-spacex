version: "3.8"

# Override file for Feature 016: CRDT collaboration transport.
# Run alongside docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.override.yml up -d

services:
  y-websocket:
    build:
      context: ./docker/y-websocket
      dockerfile: Dockerfile
    container_name: pilot-space-y-websocket
    ports:
      - "${YWEBSOCKET_PORT:-1234}:${PORT:-1234}"
    environment:
      - PORT=${YWEBSOCKET_PORT:-1234}
      - HOST=0.0.0.0
      - YPERSISTENCE=/data
    volumes:
      - y-websocket-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT:-1234}/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  y-websocket-data:
