# Pilot Space Ingress Configuration
# Documentation: docs/architect/infrastructure.md
#
# Features:
#   - TLS termination with Let's Encrypt via cert-manager
#   - Path-based routing: / -> frontend, /api -> backend
#   - Rate limiting and security headers
#   - WebSocket support for Supabase Realtime
#
# Prerequisites:
#   - nginx-ingress controller installed
#   - cert-manager installed for TLS
#
# Usage:
#   kubectl apply -f ingress.yaml
#
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pilot-space-ingress
  namespace: pilot-space
  labels:
    app: pilot-space
  annotations:
    # Ingress controller configuration
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/use-regex: "true"

    # TLS configuration with cert-manager
    cert-manager.io/cluster-issuer: letsencrypt-prod

    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Rate limiting (global)
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "50"

    # Proxy settings
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"

    # WebSocket support (for SSE streaming)
    nginx.ingress.kubernetes.io/proxy-buffering: "off"

    # CORS (handled by backend, but allow preflight)
    nginx.ingress.kubernetes.io/enable-cors: "false"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - pilot-space.example.com
        - api.pilot-space.example.com
      secretName: pilot-space-tls
  rules:
    # Main domain routes to frontend
    - host: pilot-space.example.com
      http:
        paths:
          # API routes to backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: pilot-space-backend
                port:
                  number: 8000
          # Health check routes to backend
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: pilot-space-backend
                port:
                  number: 8000
          # All other routes to frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pilot-space-frontend
                port:
                  number: 3000

    # Dedicated API subdomain (optional)
    - host: api.pilot-space.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pilot-space-backend
                port:
                  number: 8000

---
# Ingress for AI endpoints with stricter rate limiting
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pilot-space-ingress-ai
  namespace: pilot-space
  labels:
    app: pilot-space
    component: ai
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod

    # Stricter rate limiting for AI endpoints (DD-003)
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-connections: "20"

    # Longer timeouts for AI processing
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"

    # SSE streaming support
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/chunked-transfer-encoding: "on"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - pilot-space.example.com
      secretName: pilot-space-tls
  rules:
    - host: pilot-space.example.com
      http:
        paths:
          - path: /api/v1/ai
            pathType: Prefix
            backend:
              service:
                name: pilot-space-backend
                port:
                  number: 8000
          - path: /api/v1/notes/.*/ai
            pathType: ImplementationSpecific
            backend:
              service:
                name: pilot-space-backend
                port:
                  number: 8000
          - path: /api/v1/issues/.*/ai
            pathType: ImplementationSpecific
            backend:
              service:
                name: pilot-space-backend
                port:
                  number: 8000
