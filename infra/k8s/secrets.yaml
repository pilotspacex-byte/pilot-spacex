# Pilot Space Secrets Template
# Documentation: docs/architect/infrastructure.md
#
# SECURITY WARNING:
#   This file contains placeholders for sensitive values.
#   NEVER commit actual secrets to version control!
#
# Usage:
#   1. Copy this file to secrets.yaml.local
#   2. Replace placeholder values with real secrets
#   3. Apply using: kubectl apply -f secrets.yaml.local
#
# For production, use:
#   - Kubernetes External Secrets Operator
#   - HashiCorp Vault
#   - AWS Secrets Manager
#   - Supabase Vault
#
---
apiVersion: v1
kind: Secret
metadata:
  name: pilot-space-secrets
  namespace: pilot-space
  labels:
    app: pilot-space
type: Opaque
stringData:
  # Database (Supabase PostgreSQL)
  # Format: postgresql+asyncpg://user:password@host:port/database
  DATABASE_URL: "postgresql+asyncpg://postgres:CHANGE_ME@db.your-project.supabase.co:5432/postgres"

  # Redis
  # Format: redis://[:password@]host:port/db
  REDIS_URL: "redis://:CHANGE_ME@redis-host:6379/0"

  # Supabase Keys
  # Get from: https://supabase.com/dashboard/project/_/settings/api
  SUPABASE_ANON_KEY: "CHANGE_ME_SUPABASE_ANON_KEY"
  SUPABASE_SERVICE_KEY: "CHANGE_ME_SUPABASE_SERVICE_KEY"
  SUPABASE_JWT_SECRET: "CHANGE_ME_JWT_SECRET_AT_LEAST_32_CHARS"

  # Meilisearch
  MEILISEARCH_API_KEY: "CHANGE_ME_MEILISEARCH_MASTER_KEY"

  # AI Provider Keys (BYOK - optional at infrastructure level)
  # Users typically configure these per-workspace
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
  GOOGLE_API_KEY: ""

  # Encryption Key for API key storage (Fernet, 32-byte base64-encoded)
  # Generate with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
  ENCRYPTION_KEY: "CHANGE_ME_FERNET_KEY"

  # GitHub OAuth Integration
  GITHUB_CLIENT_ID: "CHANGE_ME_GITHUB_CLIENT_ID"
  GITHUB_CLIENT_SECRET: "CHANGE_ME_GITHUB_CLIENT_SECRET"
  GITHUB_WEBHOOK_SECRET: "CHANGE_ME_GITHUB_WEBHOOK_SECRET"

  # Slack Integration (optional)
  SLACK_BOT_TOKEN: ""
  SLACK_SIGNING_SECRET: ""

---
# TLS Certificate Secret (managed by cert-manager)
# This is a placeholder - actual certificates are generated automatically
apiVersion: v1
kind: Secret
metadata:
  name: pilot-space-tls
  namespace: pilot-space
  labels:
    app: pilot-space
  annotations:
    cert-manager.io/issuer-kind: ClusterIssuer
    cert-manager.io/issuer-name: letsencrypt-prod
type: kubernetes.io/tls
data:
  # These will be populated by cert-manager
  tls.crt: ""
  tls.key: ""

---
# Image pull secret for private registry (optional)
apiVersion: v1
kind: Secret
metadata:
  name: pilot-space-registry
  namespace: pilot-space
  labels:
    app: pilot-space
type: kubernetes.io/dockerconfigjson
data:
  # Base64-encoded Docker config JSON
  # Generate with: kubectl create secret docker-registry pilot-space-registry \
  #   --docker-server=your-registry.io \
  #   --docker-username=username \
  #   --docker-password=password \
  #   --dry-run=client -o jsonpath='{.data.\.dockerconfigjson}'
  .dockerconfigjson: ""
