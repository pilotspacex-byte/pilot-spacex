# Pilot Space Frontend Kubernetes Deployment
# Documentation: docs/architect/infrastructure.md
#
# Deployment Strategy:
#   - Next.js standalone server for optimal performance
#   - CDN/Ingress handles static asset caching
#   - Horizontal scaling with HPA based on CPU/memory
#
# Usage:
#   kubectl apply -f frontend-deployment.yaml
#   kubectl rollout status deployment/pilot-space-frontend
#
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pilot-space-frontend
  namespace: pilot-space
  labels:
    app: pilot-space
    component: frontend
    tier: presentation
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: pilot-space
      component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: pilot-space
        component: frontend
        tier: presentation
    spec:
      serviceAccountName: pilot-space-frontend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 30

      containers:
        - name: frontend
          image: pilot-space/frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: pilot-space-config
                  key: API_URL
            - name: NEXT_PUBLIC_SUPABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: pilot-space-config
                  key: SUPABASE_URL
            - name: NEXT_PUBLIC_SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: pilot-space-secrets
                  key: SUPABASE_ANON_KEY
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"

          # Kubernetes probes for health checking
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30

          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: next-cache
              mountPath: /app/.next/cache

      volumes:
        - name: tmp
          emptyDir: {}
        - name: next-cache
          emptyDir: {}

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: component
                      operator: In
                      values:
                        - frontend
                topologyKey: kubernetes.io/hostname

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              component: frontend

---
apiVersion: v1
kind: Service
metadata:
  name: pilot-space-frontend
  namespace: pilot-space
  labels:
    app: pilot-space
    component: frontend
spec:
  type: ClusterIP
  selector:
    app: pilot-space
    component: frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pilot-space-frontend
  namespace: pilot-space
  labels:
    app: pilot-space
    component: frontend
