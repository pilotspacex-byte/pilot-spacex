# Pilot Space Pod Disruption Budget Configuration
# Documentation: docs/architect/infrastructure.md
#
# Purpose:
#   - Ensures high availability during voluntary disruptions
#   - Prevents simultaneous pod evictions during cluster maintenance
#   - Maintains minimum replicas for SLA compliance
#
# Voluntary disruptions include:
#   - kubectl drain for node maintenance
#   - Cluster autoscaler scaling down nodes
#   - Rolling updates
#   - kubectl delete pod
#
# Usage:
#   kubectl apply -f pdb.yaml
#   kubectl get pdb -n pilot-space
#
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pilot-space-backend-pdb
  namespace: pilot-space
  labels:
    app: pilot-space
    component: backend
spec:
  # Ensure at least 2 backend pods are always available
  minAvailable: 2
  selector:
    matchLabels:
      app: pilot-space
      component: backend

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pilot-space-frontend-pdb
  namespace: pilot-space
  labels:
    app: pilot-space
    component: frontend
spec:
  # Ensure at least 1 frontend pod is always available
  minAvailable: 1
  selector:
    matchLabels:
      app: pilot-space
      component: frontend

---
