# Pilot Space MVP - Docker Compose Configuration
# Documentation: docs/architect/infrastructure.md
#
# Usage:
#   Development: docker compose up -d
#   Production:  docker compose --profile production up -d
#   Full stack:  docker compose --profile supabase up -d
#
# Services:
#   - postgres:        PostgreSQL 16 with pgvector (port 5432)
#   - redis:           Redis 7 cache (port 6379)
#   - meilisearch:     Typo-tolerant search (port 7700)
#   - supabase-studio: Database GUI (port 54323, optional)
#   - backend:         FastAPI application (port 8000)
#   - frontend:        Next.js application (port 3000)

name: pilot-space

services:
  redis:
    image: redis:7-alpine
    container_name: pilot-space-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
      --timeout 0
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pilot-space-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: pilot-space-meilisearch
    restart: unless-stopped
    ports:
      - "${MEILISEARCH_PORT:-7700}:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-meilisearch-dev-key}
      MEILI_ENV: ${MEILI_ENV:-development}
      MEILI_NO_ANALYTICS: "true"
      MEILI_LOG_LEVEL: ${MEILI_LOG_LEVEL:-INFO}
      # Performance tuning
      MEILI_MAX_INDEXING_MEMORY: 512Mb
      MEILI_MAX_INDEXING_THREADS: 2
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:7700/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - pilot-space-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  migration:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/Dockerfile.migration
      args:
        PYTHON_VERSION: "3.12"
        RUN_SEED: ${RUN_SEED:-true}
    container_name: pilot-space-migration
    restart: "no"
    environment:
      # env.py converts postgresql+asyncpg:// -> postgresql:// for psycopg2
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:your-super-secret-password@db:5432/pilot_space}
      SUPABASE_URL: ${MIGRATION_SUPABASE_URL:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
    networks:
      - pilot-space-network

  backend:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/Dockerfile.backend
      target: ${BACKEND_BUILD_TARGET:-development}
      args:
        PYTHON_VERSION: "3.12"
    container_name: pilot-space-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      # Application
      APP_NAME: ${APP_NAME:-Pilot Space}
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      # Server
      HOST: "0.0.0.0"
      PORT: "8000"
      WORKERS: ${BACKEND_WORKERS:-1}

      # Database (connects to local postgres container)
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:your-super-secret-password@db:5432/pilot_space}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-5}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-10}

      # Redis
      REDIS_URL: redis://redis:6379/
      REDIS_MAX_CONNECTIONS: ${REDIS_MAX_CONNECTIONS:-10}

      # Supabase (when using external Supabase)
      SUPABASE_URL: ${SUPABASE_URL:-http://kong:8000}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      # SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}

      # Meilisearch
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY:-meilisearch-dev-key}

      # AI Providers (BYOK)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}

      # AI Configuration
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-300}
      AI_MAX_RETRIES: ${AI_MAX_RETRIES:-3}
      AI_GHOST_TEXT_DEBOUNCE_MS: ${AI_GHOST_TEXT_DEBOUNCE_MS:-500}
      AI_GHOST_TEXT_MAX_TOKENS: ${AI_GHOST_TEXT_MAX_TOKENS:-50}

      PILOTSPACE_MODEL_SONNET_DEFAULT: ${PILOTSPACE_MODEL_SONNET_DEFAULT:-}
      PILOTSPACE_MODEL_HAIKU_DEFAULT: ${PILOTSPACE_MODEL_HAIKU_DEFAULT:-}
      PILOTSPACE_MODEL_OPUS_DEFAULT: ${PILOTSPACE_MODEL_OPUS_DEFAULT:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}

      # Rate Limiting
      RATE_LIMIT_STANDARD_PER_MINUTE: ${RATE_LIMIT_STANDARD_PER_MINUTE:-1000}
      RATE_LIMIT_AI_PER_MINUTE: ${RATE_LIMIT_AI_PER_MINUTE:-100}

      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}

      # Security
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
    volumes:
      # Hot reload in development (read-only for security)
      - ../../backend/src:/app/src:ro
      - ../../backend/alembic:/app/alembic:ro
    depends_on:
      redis:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - pilot-space-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  frontend:
    build:
      context: ../../frontend
      dockerfile: ../infra/docker/Dockerfile.frontend
      target: ${FRONTEND_BUILD_TARGET:-development}
      args:
        NODE_VERSION: "20"
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
        NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL:-http://localhost:54321}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
    container_name: pilot-space-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: "3000"

      # API Configuration
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}

      # Supabase (frontend)
      NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL:-http://localhost:54321}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}

      # Feature Flags
      NEXT_PUBLIC_ENABLE_AI_FEATURES: ${NEXT_PUBLIC_ENABLE_AI_FEATURES:-true}
      NEXT_PUBLIC_ENABLE_REALTIME: ${NEXT_PUBLIC_ENABLE_REALTIME:-true}

      # Telemetry (disable in dev)
      NEXT_TELEMETRY_DISABLED: "1"
    # volumes:
    #   # Hot reload in development (read-only for security)
    #   - ../../frontend/src:/app/src:ro
    #   - ../../frontend/public:/app/public:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - pilot-space-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

# ==============================================================================
# NETWORKS
# ==============================================================================

networks:
  pilot-space-network:
    name: pilot-space-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  redis_data:
    name: pilot-space-redis-data
    driver: local

  meilisearch_data:
    name: pilot-space-meilisearch-data
    driver: local
