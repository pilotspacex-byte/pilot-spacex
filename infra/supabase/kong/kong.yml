# =============================================================================
# Pilot Space - Kong API Gateway Configuration
# =============================================================================
# Routes all traffic to Supabase services through a single entry point.
#
# Endpoints:
#   /auth/v1/*    -> GoTrue (Authentication)
#   /rest/v1/*    -> PostgREST (Auto-generated REST API)
#   /realtime/v1/* -> Realtime (WebSocket subscriptions)
#   /storage/v1/* -> Storage API (S3-compatible)
#   /functions/v1/* -> Edge Functions (Deno runtime)
#   /graphql/v1/* -> pg_graphql (GraphQL API)
#   /pg/*         -> Supavisor (Connection pooler)
#
# Security:
#   - JWT validation on protected routes
#   - CORS configuration
#   - Rate limiting (via plugins)
# =============================================================================

_format_version: "2.1"
_transform: true

# ==============================================================================
# CONSUMERS - API Key Authentication
# ==============================================================================

consumers:
  - username: anon
    keyauth_credentials:
      - key: ${ANON_KEY}
  - username: service_role
    keyauth_credentials:
      - key: ${SERVICE_ROLE_KEY}

# ==============================================================================
# ACL GROUPS
# ==============================================================================

acls:
  - consumer: anon
    group: anon
  - consumer: service_role
    group: admin

# ==============================================================================
# SERVICES & ROUTES
# ==============================================================================

services:
  # ============================================================================
  # AUTH SERVICE (GoTrue)
  # ============================================================================
  - name: auth-v1
    url: http://auth:9999/
    routes:
      - name: auth-v1-route
        strip_path: true
        paths:
          - /auth/v1/
        plugins:
          - name: cors
          - name: key-auth
            config:
              hide_credentials: true
              key_names:
                - apikey
          - name: acl
            config:
              hide_groups_header: true
              allow:
                - anon
                - admin

  # ============================================================================
  # REST SERVICE (PostgREST)
  # ============================================================================
  - name: rest-v1
    url: http://rest:3000/
    routes:
      - name: rest-v1-route
        strip_path: true
        paths:
          - /rest/v1/
        plugins:
          - name: cors
          - name: key-auth
            config:
              hide_credentials: true
              key_names:
                - apikey
          - name: acl
            config:
              hide_groups_header: true
              allow:
                - anon
                - admin

  # ============================================================================
  # GRAPHQL SERVICE (pg_graphql via PostgREST)
  # ============================================================================
  - name: graphql-v1
    url: http://rest:3000/rpc/graphql
    routes:
      - name: graphql-v1-route
        strip_path: true
        paths:
          - /graphql/v1
        plugins:
          - name: cors
          - name: key-auth
            config:
              hide_credentials: true
              key_names:
                - apikey
          - name: acl
            config:
              hide_groups_header: true
              allow:
                - anon
                - admin
          - name: request-transformer
            config:
              add:
                headers:
                  - Content-Profile:graphql_public

  # ============================================================================
  # REALTIME SERVICE (Phoenix/Elixir WebSocket)
  # ============================================================================
  - name: realtime-v1
    url: http://realtime:4000/socket
    routes:
      - name: realtime-v1-route
        strip_path: true
        paths:
          - /realtime/v1/
        plugins:
          - name: cors
          - name: key-auth
            config:
              hide_credentials: true
              key_names:
                - apikey
          - name: acl
            config:
              hide_groups_header: true
              allow:
                - anon
                - admin

  # Realtime WebSocket upgrade endpoint
  - name: realtime-v1-ws
    url: http://realtime:4000/socket
    routes:
      - name: realtime-v1-ws-route
        strip_path: true
        paths:
          - /realtime/v1/websocket
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: true
          key_names:
            - apikey
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - anon
            - admin

  # ============================================================================
  # STORAGE SERVICE (S3-Compatible)
  # ============================================================================
  - name: storage-v1
    url: http://storage:5000/
    routes:
      - name: storage-v1-route
        strip_path: true
        paths:
          - /storage/v1/
        plugins:
          - name: cors
          - name: key-auth
            config:
              hide_credentials: true
              key_names:
                - apikey
          - name: acl
            config:
              hide_groups_header: true
              allow:
                - anon
                - admin

  # Storage object endpoints (requires different handling)
  - name: storage-v1-s3
    url: http://storage:5000/
    routes:
      - name: storage-v1-s3-route
        strip_path: false
        paths:
          - /object/
          - /render/
        plugins:
          - name: cors

  # ============================================================================
  # EDGE FUNCTIONS SERVICE (Deno Runtime)
  # ============================================================================
  - name: functions-v1
    url: http://functions:9000/
    routes:
      - name: functions-v1-route
        strip_path: true
        paths:
          - /functions/v1/
        plugins:
          - name: cors
          - name: key-auth
            config:
              hide_credentials: true
              key_names:
                - apikey
          - name: acl
            config:
              hide_groups_header: true
              allow:
                - anon
                - admin

  # ============================================================================
  # META SERVICE (Database Metadata for Studio)
  # ============================================================================
  - name: meta
    url: http://meta:8080/
    routes:
      - name: meta-route
        strip_path: true
        paths:
          - /pg/
        plugins:
          - name: key-auth
            config:
              hide_credentials: true
              key_names:
                - apikey
          - name: acl
            config:
              hide_groups_header: true
              allow:
                - admin

# ==============================================================================
# PLUGINS - Global Configuration
# ==============================================================================

plugins:
  # CORS configuration - allows browser requests from any origin
  # Tighten this in production
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
        - HEAD
      headers:
        - Accept
        - Accept-Encoding
        - Authorization
        - Content-Type
        - apikey
        - x-client-info
        - x-supabase-api-version
        - Range
      exposed_headers:
        - Content-Range
        - Content-Length
        - X-Total-Count
      credentials: true
      max_age: 3600
      preflight_continue: false

  # Request size limit
  - name: request-size-limiting
    config:
      allowed_payload_size: 100
      size_unit: megabytes
      require_content_length: false

# ==============================================================================
# UPSTREAMS - Load Balancing (for horizontal scaling)
# ==============================================================================
# Uncomment and configure for production with multiple instances

