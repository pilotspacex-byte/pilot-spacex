# =============================================================================
# Pilot Space - Self-Hosted Supabase Stack
# =============================================================================
# Complete self-hosted Supabase with all services integrated with Pilot Space.
#
# Services included:
#   - PostgreSQL 16 with pgvector, pgmq, pg_cron
#   - Kong API Gateway (routes all traffic)
#   - GoTrue (Auth service)
#   - PostgREST (Auto-generated REST API)
#   - Realtime (WebSocket subscriptions)
#   - Storage API (S3-compatible)
#   - Supavisor (Connection pooler)
#   - Studio (Admin dashboard - optional)
#   - Redis (caching - kept for AI response caching)
#   - Meilisearch (full-text search - kept for typo-tolerant search)
#
# Usage:
#   Development: docker compose up -d
#   Production:  docker compose --profile production up -d
#   With Studio: docker compose --profile studio up -d
#
# After starting, access:
#   - API Gateway: http://localhost:8000 (Kong)
#   - Studio:      http://localhost:54323 (if enabled)
#   - Meilisearch: http://localhost:7700
# =============================================================================

name: pilot-space-supabase

services:
  # ============================================================================
  # DATABASE - PostgreSQL 16 with Extensions
  # ============================================================================

  db:
    image: supabase/postgres:15.8.1.076
    container_name: pilot-space-db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-supabase_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      # JWT configuration for Supabase
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXP: ${JWT_EXPIRY:-3600}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./volumes/db/init:/docker-entrypoint-initdb.d:ro
      - ./volumes/db/conf/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: >
      postgres 
      -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-supabase_admin} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - supabase-network
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ============================================================================
  # KONG - API Gateway
  # ============================================================================

  kong:
    image: kong:2.8.1
    container_name: pilot-space-kong
    restart: unless-stopped
    ports:
      - "${KONG_HTTP_PORT:-8000}:8000/tcp"
      - "${KONG_HTTPS_PORT:-8443}:8443/tcp"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth,request-size-limiting
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      # Logging
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
    volumes:
      - ./kong/kong-processed.yml:/var/lib/kong/kong.yml:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
    networks:
      - supabase-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ============================================================================
  # GOTRUE - Authentication Service
  # ============================================================================

  auth:
    image: supabase/gotrue:v2.164.0
    container_name: pilot-space-auth
    restart: unless-stopped
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://localhost:8000}

      # Database
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://${POSTGRES_USER:-supabase_admin}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}?search_path=auth

      # Site URL
      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:3000}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS:-}

      # JWT
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: ${JWT_EXPIRY:-3600}
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_ADMIN_ROLES: service_role

      # Disable signup to manage users via API
      GOTRUE_DISABLE_SIGNUP: ${DISABLE_SIGNUP:-false}

      # External OAuth providers (configure as needed)
      GOTRUE_EXTERNAL_EMAIL_ENABLED: ${ENABLE_EMAIL_SIGNUP:-true}
      GOTRUE_EXTERNAL_PHONE_ENABLED: ${ENABLE_PHONE_AUTH:-false}
      GOTRUE_EXTERNAL_GITHUB_ENABLED: ${ENABLE_GITHUB_AUTH:-false}
      GOTRUE_EXTERNAL_GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GOTRUE_EXTERNAL_GITHUB_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: ${ENABLE_GOOGLE_AUTH:-false}
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOOGLE_CLIENT_SECRET:-}

      # SMTP configuration
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-587}
      GOTRUE_SMTP_USER: ${SMTP_USER:-}
      GOTRUE_SMTP_PASS: ${SMTP_PASS:-}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL:-admin@pilot-space.local}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-Pilot Space}
      GOTRUE_MAILER_AUTOCONFIRM: ${MAILER_AUTOCONFIRM:-false}
      GOTRUE_MAILER_URLPATHS_INVITE: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/v1/verify

      # Email templates
      GOTRUE_MAILER_TEMPLATES_INVITE: ""
      GOTRUE_MAILER_TEMPLATES_CONFIRMATION: ""
      GOTRUE_MAILER_TEMPLATES_RECOVERY: ""
      GOTRUE_MAILER_TEMPLATES_MAGIC_LINK: ""

      # Security
      GOTRUE_RATE_LIMIT_HEADER: X-Forwarded-For
      GOTRUE_SECURITY_REFRESH_TOKEN_ROTATION_ENABLED: true
      GOTRUE_SECURITY_REFRESH_TOKEN_REUSE_INTERVAL: 10
      GOTRUE_SECURITY_UPDATE_PASSWORD_REQUIRE_REAUTHENTICATION: false

      # Captcha (optional)
      GOTRUE_SECURITY_CAPTCHA_ENABLED: ${ENABLE_CAPTCHA:-false}
      GOTRUE_SECURITY_CAPTCHA_PROVIDER: ${CAPTCHA_PROVIDER:-hcaptcha}
      GOTRUE_SECURITY_CAPTCHA_SECRET: ${CAPTCHA_SECRET:-}

      # MFA
      GOTRUE_MFA_ENABLED: ${ENABLE_MFA:-true}

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
    networks:
      - supabase-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ============================================================================
  # POSTGREST - Auto-generated REST API
  # ============================================================================

  rest:
    image: postgrest/postgrest:v12.2.3
    container_name: pilot-space-rest
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER:-supabase_admin}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS:-public,storage,graphql_public}
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY:-3600}
      PGRST_DB_MAX_ROWS: ${PGRST_DB_MAX_ROWS:-1000}
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
    networks:
      - supabase-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ============================================================================
  # REALTIME - WebSocket Subscriptions
  # ============================================================================

  realtime:
    image: supabase/realtime:v2.33.58
    container_name: pilot-space-realtime
    restart: unless-stopped
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-postgres}
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: ${REALTIME_DB_ENC_KEY:-supabaserealtime}
      API_JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${REALTIME_SECRET_KEY_BASE:?REALTIME_SECRET_KEY_BASE is required}
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES: "''"
      RLIMIT_NOFILE: 10000
      APP_NAME: realtime
      SEED_SELF_HOST: true
      MAX_HEADER_LENGTH: 4096
      REPLICATION_MODE: RLS
      REPLICATION_POLL_INTERVAL: 100
      SECURE_CHANNELS: "true"
      SLOT_NAME: supabase_realtime_rls
      TEMPORARY_SLOT: "true"
      # Tenant configuration
      REALTIME_IP_VERSION: IPv4
    command: >
      sh -c "/app/bin/migrate && /app/bin/realtime eval 'Realtime.Release.seeds(Realtime.Repo)' && /app/bin/server"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy
    networks:
      - supabase-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ============================================================================
  # STORAGE - S3-Compatible File Storage
  # ============================================================================

  storage:
    image: supabase/storage-api:v1.11.13
    container_name: pilot-space-storage
    restart: unless-stopped
    environment:
      ANON_KEY: ${ANON_KEY:?ANON_KEY is required}
      SERVICE_KEY: ${SERVICE_ROLE_KEY:?SERVICE_ROLE_KEY is required}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://${POSTGRES_USER:-supabase_admin}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      FILE_SIZE_LIMIT: ${FILE_SIZE_LIMIT:-52428800}
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: local
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://imgproxy:8080
    volumes:
      - storage_data:/var/lib/storage
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_healthy
    networks:
      - supabase-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ============================================================================
  # IMGPROXY - Image Transformation
  # ============================================================================

  imgproxy:
    image: darthsim/imgproxy:v3.8.0
    container_name: pilot-space-imgproxy
    restart: unless-stopped
    environment:
      IMGPROXY_BIND: ":8080"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: ${IMGPROXY_ENABLE_WEBP_DETECTION:-true}
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - supabase-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ============================================================================
  # META - Database Metadata for Studio
  # ============================================================================

  meta:
    image: supabase/postgres-meta:v0.84.2
    container_name: pilot-space-meta
    restart: unless-stopped
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: ${POSTGRES_DB:-postgres}
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r => process.exit(r.ok ? 0 : 1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
    networks:
      - supabase-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ============================================================================
  # EDGE FUNCTIONS - Deno Runtime (Optional)
  # ============================================================================

  functions:
    image: supabase/edge-runtime:v1.67.4
    container_name: pilot-space-functions
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_DB_URL: postgresql://${POSTGRES_USER:-supabase_admin}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      # For OpenAI embeddings (BYOK)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      VERIFY_JWT: "${FUNCTIONS_VERIFY_JWT:-true}"
    volumes:
      - ./volumes/functions:/home/deno/functions:ro
    command:
      - start
      - --main-service
      - /home/deno/functions/main
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
    networks:
      - supabase-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ============================================================================
  # SUPAVISOR - Connection Pooler
  # ============================================================================

  supavisor:
    image: supabase/supavisor:1.1.58
    container_name: pilot-space-supavisor
    restart: unless-stopped
    ports:
      - "${SUPAVISOR_PORT:-15432}:5432"
      - "${SUPAVISOR_TRANSACTION_PORT:-6543}:6543"
    environment:
      PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER:-supabase_admin}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      CLUSTER_POSTGRES: "true"
      SECRET_KEY_BASE: ${SUPAVISOR_SECRET_KEY_BASE:?SUPAVISOR_SECRET_KEY_BASE is required}
      VAULT_ENC_KEY: ${VAULT_ENC_KEY:-supabase-vault-encryption-key-xxxxx}
      API_JWT_SECRET: ${JWT_SECRET}
      METRICS_JWT_SECRET: ${JWT_SECRET}
      REGION: local
      ERL_AFLAGS: -proto_dist inet_tcp
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy
    networks:
      - supabase-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ============================================================================
  # STUDIO - Admin Dashboard (Optional)
  # ============================================================================

  studio:
    image: supabase/studio:latest
    container_name: pilot-space-studio
    restart: unless-stopped
    profiles:
      - studio
    ports:
      - "${STUDIO_PORT:-54323}:3000"
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      DEFAULT_ORGANIZATION_NAME: ${STUDIO_DEFAULT_ORGANIZATION:-Pilot Space}
      DEFAULT_PROJECT_NAME: ${STUDIO_DEFAULT_PROJECT:-pilot-space}

      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${API_EXTERNAL_URL:-http://localhost:8000}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}

      AUTH_JWT_SECRET: ${JWT_SECRET}
      LOGFLARE_API_KEY: ${LOGFLARE_API_KEY:-}
      LOGFLARE_URL: http://analytics:4000
      NEXT_PUBLIC_ENABLE_LOGS: "true"
      NEXT_ANALYTICS_BACKEND_PROVIDER: postgres
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/profile"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      kong:
        condition: service_healthy
      meta:
        condition: service_healthy
    networks:
      - supabase-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ============================================================================
  # ANALYTICS - Logflare for Logs (Optional)
  # ============================================================================

  analytics:
    image: supabase/logflare:1.4.0
    container_name: pilot-space-analytics
    restart: unless-stopped
    profiles:
      - analytics
    environment:
      LOGFLARE_NODE_HOST: 127.0.0.1
      DB_USERNAME: supabase_admin
      DB_DATABASE: ${POSTGRES_DB:-postgres}
      DB_HOSTNAME: db
      DB_PORT: 5432
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SCHEMA: _analytics
      LOGFLARE_API_KEY: ${LOGFLARE_API_KEY:-your-logflare-api-key}
      LOGFLARE_SINGLE_TENANT: "true"
      LOGFLARE_SUPABASE_MODE: "true"
      LOGFLARE_MIN_CLUSTER_SIZE: 1
      POSTGRES_BACKEND_URL: postgresql://${POSTGRES_USER:-supabase_admin}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postgres}
      POSTGRES_BACKEND_SCHEMA: _analytics
      LOGFLARE_FEATURE_FLAG_OVERRIDE: multibackend=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy
    networks:
      - supabase-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ============================================================================
  # EXTERNAL SERVICES (Pilot Space Specific)
  # ============================================================================

  # Redis - Kept for AI response caching and session management
  redis:
    image: redis:7-alpine
    container_name: pilot-space-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory ${REDIS_MAX_MEMORY:-256mb}
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
      --timeout 0
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - supabase-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # Meilisearch - Kept for typo-tolerant full-text search
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: pilot-space-meilisearch
    restart: unless-stopped
    ports:
      - "${MEILISEARCH_PORT:-7700}:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:?MEILISEARCH_API_KEY is required}
      MEILI_ENV: ${MEILI_ENV:-development}
      MEILI_NO_ANALYTICS: "true"
      MEILI_LOG_LEVEL: ${MEILI_LOG_LEVEL:-INFO}
      MEILI_MAX_INDEXING_MEMORY: ${MEILI_MAX_INDEXING_MEMORY:-512Mb}
      MEILI_MAX_INDEXING_THREADS: ${MEILI_MAX_INDEXING_THREADS:-2}
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:7700/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - supabase-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

# ==============================================================================
# NETWORKS
# ==============================================================================

networks:
  supabase-network:
    name: pilot-space-supabase-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/16

# ==============================================================================
# VOLUMES
# ==============================================================================

volumes:
  postgres_data:
    name: pilot-space-postgres-data
    driver: local

  storage_data:
    name: pilot-space-storage-data
    driver: local

  redis_data:
    name: pilot-space-redis-data
    driver: local

  meilisearch_data:
    name: pilot-space-meilisearch-data
    driver: local
