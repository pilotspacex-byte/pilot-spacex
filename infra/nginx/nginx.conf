# =============================================================================
# Pilot Space - Nginx Reverse Proxy Configuration
# =============================================================================
# Used when running: docker compose --profile production up -d
#
# Architecture:
#   Internet -> Nginx :80/:443 -> frontend :3000
#                              -> backend  :8000 (/api/v1/*, /health)
#                              -> kong     :8000 (/auth/v1/*)
#
# TLS: Place your certificates at infra/nginx/certs/
#   server.crt  — full certificate chain (PEM)
#   server.key  — private key (PEM)
#
# For a quick self-signed cert (development only):
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout infra/nginx/certs/server.key \
#     -out infra/nginx/certs/server.crt \
#     -subj "/CN=localhost"
# =============================================================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS termination
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Frontend — Next.js
        location / {
            proxy_pass         http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Backend API
        location ~ ^/(api|health) {
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            client_max_body_size 50m;
        }

        # Supabase auth (Kong gateway)
        location /auth/ {
            proxy_pass         http://supabase-kong:8000/auth/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
