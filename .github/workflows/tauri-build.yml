name: Tauri Build

on:
  push:
    branches: [main, develop, 'feat/tauri-*']
    tags: ['v*']
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact-name: pilot-space-macos-arm64
          - platform: macos-13
            target: x86_64-apple-darwin
            artifact-name: pilot-space-macos-x86_64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact-name: pilot-space-linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact-name: pilot-space-windows-x64

    runs-on: ${{ matrix.platform }}
    name: Build ${{ matrix.artifact-name }}
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './tauri-app/src-tauri -> target'

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install Tauri CLI dependencies
        working-directory: tauri-app
        run: pnpm install --frozen-lockfile

      - name: Sign sidecar binary (macOS)
        if: runner.os == 'macOS' && env.APPLE_SIGNING_IDENTITY != ''
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TARGET: ${{ matrix.target }}
        run: |
          SIDECAR="tauri-app/src-tauri/binaries/pilot-cli-${TARGET}"
          if [ -f "$SIDECAR" ]; then
            codesign --force --options runtime \
              --sign "$APPLE_SIGNING_IDENTITY" \
              --entitlements tauri-app/src-tauri/Entitlements.plist \
              "$SIDECAR"
            echo "Signed sidecar: $SIDECAR"
            codesign -dv "$SIDECAR"
          else
            echo "No sidecar binary found at $SIDECAR — skipping signing"
          fi

      - name: Install Azure SignTool (Windows)
        if: runner.os == 'Windows'
        run: dotnet tool install --global AzureSignTool

      - name: Sign sidecar binary (Windows)
        if: runner.os == 'Windows' && env.AZURE_KEY_VAULT_URI != ''
        env:
          AZURE_KEY_VAULT_URI: ${{ secrets.AZURE_KEY_VAULT_URI }}
          AZURE_KEY_VAULT_CLIENT_ID: ${{ secrets.AZURE_KEY_VAULT_CLIENT_ID }}
          AZURE_KEY_VAULT_CLIENT_SECRET: ${{ secrets.AZURE_KEY_VAULT_CLIENT_SECRET }}
          AZURE_KEY_VAULT_TENANT_ID: ${{ secrets.AZURE_KEY_VAULT_TENANT_ID }}
          AZURE_KEY_VAULT_CERT_NAME: ${{ secrets.AZURE_KEY_VAULT_CERT_NAME }}
        shell: pwsh
        run: |
          $sidecar = "tauri-app\src-tauri\binaries\pilot-cli-x86_64-pc-windows-msvc.exe"
          if (Test-Path $sidecar) {
            AzureSignTool sign -kvu $env:AZURE_KEY_VAULT_URI `
              -kvi $env:AZURE_KEY_VAULT_CLIENT_ID `
              -kvs $env:AZURE_KEY_VAULT_CLIENT_SECRET `
              -kvt $env:AZURE_KEY_VAULT_TENANT_ID `
              -kvc $env:AZURE_KEY_VAULT_CERT_NAME `
              -tr "http://timestamp.digicert.com" `
              -td sha256 `
              $sidecar
            Write-Host "Signed sidecar: $sidecar"
          } else {
            Write-Host "No sidecar binary found — skipping signing"
          }

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_TAURI: 'true'
          NEXT_PUBLIC_API_URL: 'https://api.pilotspace.io/api/v1'
          # macOS signing (set in GitHub repo secrets)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows EV signing via Azure Key Vault (set in GitHub repo secrets)
          AZURE_KEY_VAULT_URI: ${{ secrets.AZURE_KEY_VAULT_URI }}
          AZURE_KEY_VAULT_CLIENT_ID: ${{ secrets.AZURE_KEY_VAULT_CLIENT_ID }}
          AZURE_KEY_VAULT_CLIENT_SECRET: ${{ secrets.AZURE_KEY_VAULT_CLIENT_SECRET }}
          AZURE_KEY_VAULT_TENANT_ID: ${{ secrets.AZURE_KEY_VAULT_TENANT_ID }}
          AZURE_KEY_VAULT_CERT_NAME: ${{ secrets.AZURE_KEY_VAULT_CERT_NAME }}
        with:
          projectPath: './tauri-app'
          tauriScript: 'pnpm tauri'
          args: '--target ${{ matrix.target }}'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/
          retention-days: 7
          if-no-files-found: warn
