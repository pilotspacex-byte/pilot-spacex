# Ruff configuration for Pilot Space backend
# https://docs.astral.sh/ruff/configuration/

# Target Python version
target-version = "py312"

# Line length (match Black default)
line-length = 100

# Exclude directories
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "alembic/versions",
    ".pytest_cache",
    ".ruff_cache",
    "dist",
    "build",
]

[lint]
# Enable rule categories
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "SIM",    # flake8-simplify
    "ASYNC",  # flake8-async
    "C4",     # flake8-comprehensions
    "DTZ",    # flake8-datetimez
    "T10",    # flake8-debugger
    "ISC",    # flake8-implicit-str-concat
    "PIE",    # flake8-pie
    "PYI",    # flake8-pyi
    "PT",     # flake8-pytest-style
    "Q",      # flake8-quotes
    "RSE",    # flake8-raise
    "RET",    # flake8-return
    "SLF",    # flake8-self
    "TCH",    # flake8-type-checking
    "ARG",    # flake8-unused-arguments
    "PTH",    # flake8-use-pathlib
    "PL",     # Pylint
    "TRY",    # tryceratops
    "FLY",    # flynt
    "PERF",   # Perflint
    "RUF",    # Ruff-specific rules
]

# Ignore specific rules
ignore = [
    "E501",     # Line too long (handled by formatter)
    "PLC0415",  # Import not at top of file (lazy imports for circular deps)
    "PLR0912",  # Too many branches (needed for JSON parsing)
    "PLR0913",  # Too many arguments (often needed for FastAPI)
    "PLR0915",  # Too many statements (needed for complex parsing)
    "PLR2004",  # Magic value comparison (common in tests)
    "TRY003",   # Long exception messages (sometimes needed)
    "TRY300",   # Consider moving return to else block (style preference)
    "TRY401",   # Redundant exception in logging.exception (useful for context)
    "ARG001",   # Unused function argument (often needed for interfaces)
    "ARG002",   # Unused method argument (often needed for interface/base class implementations)
    "TC001",    # Move application import into TYPE_CHECKING (needed at runtime)
    "TC002",    # Move third-party import into TYPE_CHECKING (needed at runtime for Pydantic/SQLAlchemy)
    "TC003",    # Move standard library import into TYPE_CHECKING (needed at runtime for SQLAlchemy)
    "SIM102",   # Nested if for change detection readability
    "RUF034",   # Useless if-else (sometimes intentional for consistency)
    "PERF401",  # Use list comprehension (sometimes loop is clearer)
    "B008",     # Function call in default argument (standard FastAPI Depends() pattern)
    "RUF001",   # Ambiguous unicode character (intentional in prompts/templates)
    "UP046",    # PEP 695 Generic class - not fully supported by pyright for dataclasses
    "UP047",    # PEP 695 Generic function - TypeVar needed for decorator patterns
    "PYI034",   # __new__ returning Self - singleton pattern requires type: ignore
]

# Allow autofix for all enabled rules
fixable = ["ALL"]
unfixable = []

# Allow unused variables when underscore-prefixed
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[lint.per-file-ignores]
# Tests can have assertions, unused fixtures, and access private members for unit testing
"tests/**/*.py" = ["S101", "ARG001", "PLR2004", "SLF001", "F841", "RUF059", "PLR0911", "PLW0108"]
# Init files can have unused imports
"__init__.py" = ["F401"]
# Alembic migrations have specific patterns
"alembic/**/*.py" = ["INP001", "E501"]
# Domain models __all__ is grouped by category, not alphabetical
"src/pilot_space/domain/models/__init__.py" = ["RUF022"]
# Complex hook dispatch has many return paths
"src/pilot_space/ai/sdk/file_hooks.py" = ["PLR0911"]
"src/pilot_space/ai/sdk/hook_executor.py" = ["PLR0911"]
# GitHub tools use early-return guard clauses across multiple error paths
"src/pilot_space/ai/tools/github_tools.py" = ["PLR0911"]
# MCP OAuth callback uses early-return guard clauses for multiple error paths
"src/pilot_space/api/v1/routers/workspace_mcp_servers.py" = ["PLR0911"]
# Scripts have relaxed rules
"scripts/**/*.py" = ["DTZ005", "T20", "INP001", "F841", "RUF059", "PTH123", "RET504", "TRY400", "PLR0911", "RUF022"]

[lint.isort]
# isort configuration
known-first-party = ["pilot_space"]
combine-as-imports = true
force-wrap-aliases = true

[lint.flake8-pytest-style]
fixture-parentheses = false
mark-parentheses = false

[lint.flake8-quotes]
docstring-quotes = "double"
inline-quotes = "double"

[format]
# Formatter configuration
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
docstring-code-format = true
docstring-code-line-length = 80
