# Pre-commit hooks for Pilot Space backend
# Install: pre-commit install
# Run all: pre-commit run --all-files
# Update: pre-commit autoupdate

default_language_version:
  python: python3.12

repos:
  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: debug-statements
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  # Ruff - linting and formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.14
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  # Pyright - type checking (runs locally via uv)
  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run --extra dev pyright
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

  # File size check (max 700 lines per code file)
  - repo: local
    hooks:
      - id: check-file-size
        name: Check code file size (max 700 lines)
        entry: bash -c 'for f in "$@"; do lines=$(wc -l < "$f"); if [ "$lines" -gt 700 ]; then echo "Error - $f has $lines lines (max 700 for code files)"; exit 1; fi; done' --
        language: system
        types: [python]
        exclude: ^(alembic/versions/|tests/|scripts/|src/pilot_space/dependencies\.py|src/pilot_space/api/v1/dependencies\.py|src/pilot_space/container/container\.py|src/pilot_space/api/v1/routers/auth_sso\.py|.*\.md$|.*CLAUDE\.md$)

  # Security - detect secrets
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: (\.lock$|package-lock\.json$|\.env\.example$)

  # SQL formatting (for migrations)
  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 3.2.5
    hooks:
      - id: sqlfluff-lint
        args: [--dialect, postgres]
        additional_dependencies: [sqlfluff-templater-dbt]
        files: ^alembic/versions/.*\.py$

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.43.0
    hooks:
      - id: markdownlint
        args: [--fix, --disable, MD013, MD033, MD041]

ci:
  autofix_commit_msg: "style: auto-fix by pre-commit hooks"
  autoupdate_commit_msg: "chore: update pre-commit hooks"
  skip: [pyright]  # Skip pyright in CI (run separately for better caching)
