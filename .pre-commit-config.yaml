# prek configuration for Pilot Space
# See: https://prek.j178.dev/configuration/
minimum_prek_version: "0.3.0"

default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  # ============================================
  # Built-in hooks (fast Rust implementations)
  # ============================================
  - repo: builtin
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
        exclude: ^infra/helm/.*templates/.*\.yaml$
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: [--fix=lf]

  # ============================================
  # Frontend (TypeScript/JavaScript)
  # ============================================
  - repo: local
    hooks:
      # ESLint for TypeScript/JavaScript
      - id: eslint
        name: eslint
        entry: bash -c 'cd frontend && pnpm exec eslint --fix $(echo "$@" | sed "s|frontend/||g")' --
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx|mjs|cjs)$
        pass_filenames: true

      # TypeScript type checking (runs on all files, not individual)
      - id: tsc
        name: typescript
        entry: bash -c 'cd frontend && pnpm exec tsc --noEmit'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        exclude: (__tests__/.*|\.test\.(ts|tsx)$|\.spec\.(ts|tsx)$)
        pass_filenames: false
        require_serial: true

      # Prettier for frontend files
      - id: prettier-frontend
        name: prettier (frontend)
        entry: bash -c 'cd frontend && pnpm exec prettier --write --ignore-unknown $(echo "$@" | sed "s|frontend/||g")' --
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx|json|md|yaml|yml|css|scss)$
        pass_filenames: true

      # File size check for frontend code (max 700 lines)
      - id: check-frontend-file-size
        name: Check frontend code file size (max 700 lines)
        entry: bash -c 'for f in "$@"; do if [[ "$f" =~ \.(ts|tsx|js|jsx)$ ]] && [[ ! "$f" =~ \.md$ ]]; then lines=$(wc -l < "$f"); if [ "$lines" -gt 700 ]; then echo "Error - $f has $lines lines (max 700 for code files)"; exit 1; fi; fi; done' --
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx)$
        exclude: (\.md$|CLAUDE\.md$|\.test\.(ts|tsx|js|jsx)$|\.spec\.(ts|tsx|js|jsx)$)
        pass_filenames: true

  # ============================================
  # Backend (Python) - Ready for when backend is added
  # ============================================
  - repo: local
    hooks:
      # Ruff linting
      - id: ruff-check
        name: ruff check
        entry: bash -c 'cd backend && uv run --extra dev ruff check --fix $(echo "$@" | sed "s|backend/||g")' --
        language: system
        files: ^backend/.*\.py$
        pass_filenames: true

      # Ruff formatting
      - id: ruff-format
        name: ruff format
        entry: bash -c 'cd backend && uv run --extra dev ruff format $(echo "$@" | sed "s|backend/||g")' --
        language: system
        files: ^backend/.*\.py$
        pass_filenames: true

      # Pyright type checking (runs on all files)
      - id: pyright
        name: pyright
        entry: bash -c 'cd backend && uv run --extra dev pyright'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false
        require_serial: true

  # ============================================
  # Commit message linting
  # ============================================
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.6.0
    hooks:
      - id: commitizen
        stages: [commit-msg]
