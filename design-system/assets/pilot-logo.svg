<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Background circle with dusty blue -->
  <circle cx="24" cy="24" r="24" fill="#6B8FAD"/>

  <!-- Compass icon (white) -->
  <g transform="translate(12, 12)" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Outer circle -->
    <circle cx="12" cy="12" r="10"/>

    <!-- North needle (pointing up) -->
    <polygon points="12,2 15,11 12,10 9,11" fill="white"/>

    <!-- South needle (hollow) -->
    <polygon points="12,22 15,13 12,14 9,13" fill="none" stroke="white" stroke-width="1.5"/>

    <!-- Center dot -->
    <circle cx="12" cy="12" r="2" fill="white"/>

    <!-- Cardinal direction marks -->
    <line x1="12" y1="4" x2="12" y2="6" stroke="white" stroke-width="1.5"/>
    <line x1="12" y1="18" x2="12" y2="20" stroke="white" stroke-width="1.5"/>
    <line x1="4" y1="12" x2="6" y2="12" stroke="white" stroke-width="1.5"/>
    <line x1="18" y1="12" x2="20" y2="12" stroke="white" stroke-width="1.5"/>
  </g>
</svg>
