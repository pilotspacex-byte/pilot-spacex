openapi: "3.1.0"
info:
  title: Pilot Space AI Endpoints
  version: "1.0.0"
  description: |
    AI agent endpoints using Claude Agent SDK orchestration.
    All streaming endpoints use Server-Sent Events (SSE) format.

servers:
  - url: /api/v1
    description: API v1

paths:
  /ai/notes/{note_id}/ghost-text:
    post:
      summary: Stream ghost text suggestions
      description: |
        Generate real-time text completions for the note editor.
        Uses Claude Haiku for <2s latency (p95).
      operationId: streamGhostText
      tags: [AI, Notes]
      parameters:
        - name: note_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GhostTextRequest"
      responses:
        "200":
          description: SSE stream of ghost text chunks
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/SSEEvent"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /ai/notes/{note_id}/annotations:
    post:
      summary: Generate margin annotations
      description: |
        Generate AI suggestions for note blocks.
        Appears in right margin with confidence scores.
      operationId: generateAnnotations
      tags: [AI, Notes]
      parameters:
        - name: note_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnotationRequest"
      responses:
        "200":
          description: SSE stream of annotations
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/SSEEvent"

  /ai/notes/{note_id}/extract-issues:
    post:
      summary: Extract issues from note content
      description: |
        Identify actionable issues from note content.
        Returns issues with confidence tags (DD-048).
        Requires human approval before creation (DD-003).
      operationId: extractIssues
      tags: [AI, Notes, Issues]
      parameters:
        - name: note_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueExtractionRequest"
      responses:
        "200":
          description: SSE stream of extracted issues
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/SSEEvent"

  /ai/issues/{issue_id}/context:
    post:
      summary: Build comprehensive AI context
      description: |
        Multi-turn context generation for issue understanding.
        Includes summary, related docs, code refs, similar issues,
        and ready-to-use Claude Code prompts.
      operationId: buildAIContext
      tags: [AI, Issues]
      parameters:
        - name: issue_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIContextRequest"
      responses:
        "200":
          description: SSE stream of context building phases
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/SSEEvent"

  /ai/prs/{pr_number}/review:
    post:
      summary: Unified PR review
      description: |
        Comprehensive PR review covering architecture, security,
        code quality, performance, and documentation (DD-006).
        Uses Claude Opus 4.5 for best code understanding.
      operationId: reviewPR
      tags: [AI, PRs]
      parameters:
        - name: pr_number
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PRReviewRequest"
      responses:
        "200":
          description: SSE stream of review content
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/SSEEvent"

  /ai/conversation:
    post:
      summary: Multi-turn conversation
      description: |
        General-purpose AI conversation with session management.
        Maintains context for follow-up questions.
      operationId: conversation
      tags: [AI]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationRequest"
      responses:
        "200":
          description: SSE stream of response
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/SSEEvent"

  /ai/approvals:
    get:
      summary: List pending approvals
      description: Get pending AI approval requests for current user
      operationId: listApprovals
      tags: [AI, Approvals]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, expired]
            default: pending
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of approval requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalListResponse"

  /ai/approvals/{id}/resolve:
    post:
      summary: Resolve approval request
      description: Approve or reject an AI action
      operationId: resolveApproval
      tags: [AI, Approvals]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalResolution"
      responses:
        "200":
          description: Updated approval request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIApprovalRequest"

  /ai/costs/summary:
    get:
      summary: Get cost analytics
      description: Aggregated AI costs for workspace
      operationId: getCostSummary
      tags: [AI, Analytics]
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: start_date
          in: query
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          schema:
            type: string
            format: date
        - name: group_by
          in: query
          schema:
            type: string
            enum: [day, week, month, agent_type, user]
            default: day
      responses:
        "200":
          description: Cost summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostSummaryResponse"

  /workspaces/{id}/ai/settings:
    get:
      summary: Get workspace AI settings
      description: Get AI configuration including provider status
      operationId: getAISettings
      tags: [Workspaces, AI]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: AI settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceAISettings"

    put:
      summary: Update workspace AI settings
      description: Configure API keys and AI features
      operationId: updateAISettings
      tags: [Workspaces, AI]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspaceAISettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceAISettings"

components:
  schemas:
    SSEEvent:
      type: object
      properties:
        type:
          type: string
          enum: [content, progress, done, error]
        data:
          type: string
          description: Content chunk or progress message
        message:
          type: string
          description: Error message (when type=error)

    GhostTextRequest:
      type: object
      required: [current_text, cursor_position, block_id]
      properties:
        current_text:
          type: string
          description: Text before cursor (max 2000 chars)
          maxLength: 2000
        cursor_position:
          type: integer
          description: Cursor position in text
        block_id:
          type: string
          format: uuid
        context:
          type: string
          description: Additional context from surrounding blocks
        is_code:
          type: boolean
          default: false
        language:
          type: string
          description: Programming language if is_code=true

    AnnotationRequest:
      type: object
      required: [block_ids]
      properties:
        block_ids:
          type: array
          items:
            type: string
            format: uuid
          description: Block IDs to annotate
        include_suggestions:
          type: boolean
          default: true
        include_questions:
          type: boolean
          default: true
        include_references:
          type: boolean
          default: true

    IssueExtractionRequest:
      type: object
      properties:
        block_ids:
          type: array
          items:
            type: string
            format: uuid
          description: Specific blocks to extract from (optional)
        project_id:
          type: string
          format: uuid
          description: Target project for extracted issues
        min_confidence:
          type: number
          format: float
          default: 0.5
          minimum: 0
          maximum: 1

    AIContextRequest:
      type: object
      properties:
        session_id:
          type: string
          format: uuid
          description: Resume existing session
        refresh:
          type: boolean
          default: false
          description: Force regenerate context
        query:
          type: string
          description: Follow-up question for multi-turn

    PRReviewRequest:
      type: object
      required: [repo_full_name, project_id]
      properties:
        repo_full_name:
          type: string
          description: Repository in 'owner/repo' format
          example: "anthropics/pilot-space"
        project_id:
          type: string
          format: uuid
        review_aspects:
          type: array
          items:
            type: string
            enum: [architecture, security, code_quality, performance, documentation]
          default: [architecture, security, code_quality, performance, documentation]
        post_to_github:
          type: boolean
          default: false
          description: Post review as GitHub PR comment

    ConversationRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          maxLength: 10000
        session_id:
          type: string
          format: uuid
          description: Resume existing session
        context_type:
          type: string
          enum: [general, issue, note, project]
        context_id:
          type: string
          format: uuid
          description: ID of contextual entity

    ApprovalListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AIApprovalRequest"
        total:
          type: integer
        has_more:
          type: boolean

    AIApprovalRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        action_type:
          type: string
        description:
          type: string
        payload:
          type: object
        confidence:
          type: number
          format: float
        status:
          type: string
          enum: [pending, approved, rejected, expired]
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time
        resolved_by:
          type: string
          format: uuid

    ApprovalResolution:
      type: object
      required: [approved]
      properties:
        approved:
          type: boolean
        note:
          type: string
          description: Optional resolution note

    CostSummaryResponse:
      type: object
      properties:
        workspace_id:
          type: string
          format: uuid
        period:
          type: object
          properties:
            start:
              type: string
              format: date
            end:
              type: string
              format: date
        total_cost_usd:
          type: number
          format: float
        total_requests:
          type: integer
        breakdown:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
              agent_type:
                type: string
              provider:
                type: string
              request_count:
                type: integer
              cost_usd:
                type: number
                format: float

    WorkspaceAISettings:
      type: object
      properties:
        workspace_id:
          type: string
          format: uuid
        providers:
          type: object
          properties:
            anthropic:
              $ref: "#/components/schemas/ProviderStatus"
            openai:
              $ref: "#/components/schemas/ProviderStatus"
            google:
              $ref: "#/components/schemas/ProviderStatus"
        features:
          type: object
          properties:
            ghost_text:
              type: boolean
            margin_annotations:
              type: boolean
            issue_extraction:
              type: boolean
            ai_context:
              type: boolean
            pr_review:
              type: boolean
        autonomy_level:
          type: string
          enum: [conservative, balanced, autonomous]

    ProviderStatus:
      type: object
      properties:
        configured:
          type: boolean
        validation_status:
          type: string
          enum: [pending, valid, invalid]
        last_validated_at:
          type: string
          format: date-time

    WorkspaceAISettingsUpdate:
      type: object
      properties:
        api_keys:
          type: object
          properties:
            anthropic:
              type: string
              description: API key (write-only, never returned)
            openai:
              type: string
            google:
              type: string
        features:
          type: object
          properties:
            ghost_text:
              type: boolean
            margin_annotations:
              type: boolean
            issue_extraction:
              type: boolean
            ai_context:
              type: boolean
            pr_review:
              type: boolean
        autonomy_level:
          type: string
          enum: [conservative, balanced, autonomous]

  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"

    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"

    ProblemDetail:
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri
