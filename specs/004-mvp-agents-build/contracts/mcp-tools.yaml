# MCP Tools Specification for Pilot Space
# These tools are registered with the Claude Agent SDK MCP server

mcp_server:
  name: pilot-space
  version: "1.0.0"
  description: MCP tools for Pilot Space AI agents

tools:
  # ============================================
  # DATABASE TOOLS (Read-Only)
  # ============================================

  - name: get_issue_context
    category: database
    permission: read_only
    description: |
      Fetch complete issue context including relations, activity history,
      linked notes, and associated code references.
    parameters:
      issue_id:
        type: string
        format: uuid
        required: true
        description: UUID of the issue to fetch
      include_relations:
        type: boolean
        default: true
        description: Include related issues, notes, and pages
      include_activity:
        type: boolean
        default: false
        description: Include activity history (comments, state changes)
      max_activity_count:
        type: integer
        default: 20
        description: Maximum activity items to include
    returns:
      type: object
      properties:
        id: string
        identifier: string
        name: string
        description: string
        state: object
        priority: string
        assignee: object
        reporter: object
        labels: array
        related_issues: array
        linked_notes: array
        linked_pages: array
        activity: array
        created_at: string
        updated_at: string

  - name: get_note_content
    category: database
    permission: read_only
    description: |
      Fetch note content with block structure for annotation generation
      or issue extraction.
    parameters:
      note_id:
        type: string
        format: uuid
        required: true
        description: UUID of the note to fetch
      block_ids:
        type: array
        items:
          type: string
          format: uuid
        required: false
        description: Specific block IDs to fetch (optional, fetches all if not provided)
      include_annotations:
        type: boolean
        default: false
        description: Include existing AI annotations
    returns:
      type: object
      properties:
        id: string
        title: string
        blocks:
          type: array
          items:
            type: object
            properties:
              id: string
              type: string
              content: string
              position: integer
              annotations: array

  - name: get_project_context
    category: database
    permission: read_only
    description: |
      Fetch project settings, conventions, labels, and states
      for context-aware suggestions.
    parameters:
      project_id:
        type: string
        format: uuid
        required: true
        description: UUID of the project
      include_labels:
        type: boolean
        default: true
      include_states:
        type: boolean
        default: true
      include_conventions:
        type: boolean
        default: true
    returns:
      type: object
      properties:
        id: string
        name: string
        description: string
        labels: array
        states: array
        conventions: object
        settings: object

  - name: find_similar_issues
    category: database
    permission: read_only
    description: |
      Find semantically similar issues using embedding similarity search.
      Requires OpenAI API key for embeddings.
    parameters:
      query:
        type: string
        required: true
        description: Text to search for similar issues
      project_id:
        type: string
        format: uuid
        required: false
        description: Limit to specific project
      workspace_id:
        type: string
        format: uuid
        required: true
        description: Workspace to search within
      limit:
        type: integer
        default: 5
        maximum: 20
        description: Maximum similar issues to return
      min_similarity:
        type: number
        default: 0.7
        minimum: 0
        maximum: 1
        description: Minimum similarity threshold
    returns:
      type: array
      items:
        type: object
        properties:
          issue_id: string
          identifier: string
          name: string
          similarity: number
          state: string

  - name: get_workspace_members
    category: database
    permission: read_only
    description: |
      Fetch workspace members with their roles and expertise areas
      for assignee recommendations.
    parameters:
      workspace_id:
        type: string
        format: uuid
        required: true
      include_expertise:
        type: boolean
        default: true
        description: Include member expertise based on past assignments
    returns:
      type: array
      items:
        type: object
        properties:
          user_id: string
          name: string
          email: string
          role: string
          expertise_areas: array
          recent_assignments: integer

  - name: get_page_content
    category: database
    permission: read_only
    description: |
      Fetch documentation page content for context building.
    parameters:
      page_id:
        type: string
        format: uuid
        required: true
    returns:
      type: object
      properties:
        id: string
        title: string
        content: string
        parent_id: string
        project_id: string

  - name: get_cycle_context
    category: database
    permission: read_only
    description: |
      Fetch sprint/cycle information for task planning context.
    parameters:
      cycle_id:
        type: string
        format: uuid
        required: true
    returns:
      type: object
      properties:
        id: string
        name: string
        start_date: string
        end_date: string
        status: string
        issues: array
        velocity: number

  # ============================================
  # SEARCH TOOLS (Read-Only)
  # ============================================

  - name: semantic_search
    category: search
    permission: read_only
    description: |
      Perform semantic search across workspace content
      (issues, notes, pages) using pgvector embeddings.
    parameters:
      query:
        type: string
        required: true
        description: Search query text
      workspace_id:
        type: string
        format: uuid
        required: true
      content_types:
        type: array
        items:
          type: string
          enum: [issues, notes, pages]
        default: [issues, notes, pages]
      limit:
        type: integer
        default: 10
        maximum: 50
    returns:
      type: array
      items:
        type: object
        properties:
          type: string
          id: string
          title: string
          snippet: string
          relevance: number

  - name: search_codebase
    category: search
    permission: read_only
    description: |
      Search indexed codebase for relevant code patterns,
      functions, and files.
    parameters:
      query:
        type: string
        required: true
      project_id:
        type: string
        format: uuid
        required: true
      file_patterns:
        type: array
        items:
          type: string
        description: File glob patterns (e.g., ["*.py", "src/**/*.ts"])
      limit:
        type: integer
        default: 10
        maximum: 50
    returns:
      type: array
      items:
        type: object
        properties:
          file_path: string
          line_start: integer
          line_end: integer
          content: string
          relevance: number

  # ============================================
  # GITHUB TOOLS (Read-Only)
  # ============================================

  - name: get_pr_details
    category: github
    permission: read_only
    description: |
      Fetch pull request metadata including title, description,
      author, reviewers, and status.
    parameters:
      repo_full_name:
        type: string
        required: true
        description: Repository in 'owner/repo' format
      pr_number:
        type: integer
        required: true
    returns:
      type: object
      properties:
        number: integer
        title: string
        body: string
        state: string
        author: object
        reviewers: array
        labels: array
        head_branch: string
        base_branch: string
        created_at: string
        updated_at: string
        mergeable: boolean
        additions: integer
        deletions: integer
        changed_files: integer

  - name: get_pr_diff
    category: github
    permission: read_only
    description: |
      Fetch pull request diff with file-by-file changes.
      Handles large diffs by chunking.
    parameters:
      repo_full_name:
        type: string
        required: true
      pr_number:
        type: integer
        required: true
      max_files:
        type: integer
        default: 50
        description: Maximum files to include
      max_lines_per_file:
        type: integer
        default: 500
        description: Maximum lines per file
    returns:
      type: object
      properties:
        files:
          type: array
          items:
            type: object
            properties:
              filename: string
              status: string
              additions: integer
              deletions: integer
              patch: string
        total_additions: integer
        total_deletions: integer
        truncated: boolean
        truncation_reason: string

  - name: search_code_in_repo
    category: github
    permission: read_only
    description: |
      Search code in linked GitHub repository.
      Uses GitHub Code Search API.
    parameters:
      repo_full_name:
        type: string
        required: true
      query:
        type: string
        required: true
        description: Search query (GitHub search syntax)
      path:
        type: string
        description: Limit to specific path
      extension:
        type: string
        description: File extension filter
      limit:
        type: integer
        default: 10
        maximum: 30
    returns:
      type: array
      items:
        type: object
        properties:
          name: string
          path: string
          html_url: string
          text_matches: array

  # ============================================
  # DATABASE TOOLS (Write - Require Approval)
  # ============================================

  - name: create_note_annotation
    category: database
    permission: write
    requires_approval: false  # Auto-execute, non-destructive
    description: |
      Create an AI-generated annotation for a note block.
      Displayed in the margin.
    parameters:
      note_id:
        type: string
        format: uuid
        required: true
      block_id:
        type: string
        format: uuid
        required: true
      annotation_type:
        type: string
        enum: [suggestion, improvement, question, reference]
        required: true
      content:
        type: string
        required: true
        maxLength: 1000
      confidence:
        type: number
        required: true
        minimum: 0
        maximum: 1
      highlight_range:
        type: object
        properties:
          start: integer
          end: integer
    returns:
      type: object
      properties:
        id: string
        created: boolean

  - name: create_issue
    category: database
    permission: write
    requires_approval: true  # DD-003: Human-in-the-loop
    description: |
      Create a new issue from extracted content.
      Requires human approval before execution.
    parameters:
      project_id:
        type: string
        format: uuid
        required: true
      name:
        type: string
        required: true
        maxLength: 255
      description:
        type: string
        maxLength: 10000
      priority:
        type: string
        enum: [urgent, high, medium, low, none]
        default: medium
      labels:
        type: array
        items:
          type: string
          format: uuid
      source_note_id:
        type: string
        format: uuid
        description: Link to source note
      source_block_ids:
        type: array
        items:
          type: string
          format: uuid
        description: Source block references
      confidence:
        type: number
        minimum: 0
        maximum: 1
        description: AI confidence in extraction
    returns:
      type: object
      properties:
        approval_request_id: string
        issue_preview: object

  - name: post_pr_comment
    category: github
    permission: write
    requires_approval: false  # Auto-execute per DD-003
    description: |
      Post a review comment on a pull request.
      Can be file-level or inline.
    parameters:
      repo_full_name:
        type: string
        required: true
      pr_number:
        type: integer
        required: true
      body:
        type: string
        required: true
        maxLength: 65536
      path:
        type: string
        description: File path for inline comment
      line:
        type: integer
        description: Line number for inline comment
      side:
        type: string
        enum: [LEFT, RIGHT]
        default: RIGHT
      event:
        type: string
        enum: [COMMENT, APPROVE, REQUEST_CHANGES]
        default: COMMENT
    returns:
      type: object
      properties:
        comment_id: integer
        html_url: string

# Permission classification per DD-003
permissions:
  read_only:
    description: Tools that only read data, auto-execute without approval
    tools:
      - get_issue_context
      - get_note_content
      - get_project_context
      - find_similar_issues
      - get_workspace_members
      - get_page_content
      - get_cycle_context
      - semantic_search
      - search_codebase
      - get_pr_details
      - get_pr_diff
      - search_code_in_repo

  write:
    description: Tools that modify data
    auto_execute:
      description: Non-destructive writes, execute with notification
      tools:
        - create_note_annotation
        - post_pr_comment
    require_approval:
      description: Content creation, requires human approval
      tools:
        - create_issue
