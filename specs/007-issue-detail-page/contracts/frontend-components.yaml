# Frontend Component Contracts: Issue Detail Page
# Defines the component tree, props interfaces, and data flow

components:
  # ============================================================
  # PAGE: Issue Detail Page (route component)
  # ============================================================
  IssueDetailPage:
    path: frontend/src/app/(workspace)/[workspaceSlug]/issues/[issueId]/page.tsx
    status: EXISTS (refactor)
    description: Main page component orchestrating all sections
    props: none (uses route params)
    state:
      tanstack_query:
        - useIssueDetail(workspaceId, issueId) -> Issue
        - useActivities(issueId, cursor) -> PaginatedResponse<Activity>
        - useWorkspaceMembers(workspaceId) -> UserSummary[]
        - useWorkspaceLabels(workspaceId) -> Label[]
        - useWorkspaceCycles(workspaceId) -> CycleSummary[]
      mobx:
        - IssueStore.isEditingTitle
        - IssueStore.isEditingDescription
        - IssueStore.saveStatus (per-field)
      local:
        - isAIContextOpen (useState)
    children:
      - IssueHeader (existing)
      - IssueTitle (NEW)
      - IssueDescriptionEditor (NEW)
      - SubIssuesList (NEW)
      - ActivityTimeline (NEW)
      - IssuePropertiesPanel (NEW)
      - AIContextSidebar (existing)

  # ============================================================
  # MAIN CONTENT COMPONENTS
  # ============================================================
  IssueTitle:
    path: frontend/src/features/issues/components/issue-title.tsx
    status: NEW
    description: Inline editable title with auto-save and validation
    props:
      title: string
      onSave: (title: string) => Promise<void>
      disabled: boolean (optional, default false)
    behavior:
      - Click to edit (text input replaces heading)
      - Enter confirms, Escape cancels
      - 2s debounce auto-save on blur
      - Validation: 1-255 chars
      - SaveStatus indicator ("Saving..." → "Saved")

  IssueDescriptionEditor:
    path: frontend/src/features/issues/components/issue-description-editor.tsx
    status: NEW
    description: TipTap rich text editor for issue description
    props:
      content: string | null (HTML)
      onSave: (content: string, html: string) => Promise<void>
      readOnly: boolean (optional, default false)
    behavior:
      - Dynamic import (next/dynamic) for code splitting
      - Reduced TipTap extension set (no ghost text, no annotations)
      - 2s debounce auto-save on content change
      - Placeholder "Add a description..."
      - SaveStatus indicator

  SubIssuesList:
    path: frontend/src/features/issues/components/sub-issues-list.tsx
    status: NEW
    description: List of child issues with progress indicator
    props:
      parentId: string
      children: IssueSummary[]
      workspaceSlug: string
      onCreateSubIssue: (data: CreateSubIssueData) => Promise<void>
    behavior:
      - Progress bar (completed / total)
      - Click navigates to sub-issue detail
      - "Add sub-issue" inline form

  ActivityTimeline:
    path: frontend/src/features/issues/components/activity-timeline.tsx
    status: NEW
    description: Chronological feed of issue changes and comments
    props:
      issueId: string
      workspaceId: string
      currentUserId: string
    behavior:
      - useInfiniteQuery for paginated loading (50 per page)
      - IntersectionObserver sentinel for infinite scroll
      - Comment input at bottom (Enter submit, Shift+Enter newline)
      - Edit/delete own comments (hover reveal)
      - AI entries with dusty blue sparkles icon

  ActivityEntry:
    path: frontend/src/features/issues/components/activity-entry.tsx
    status: NEW
    description: Single activity timeline entry
    props:
      activity: Activity
      isOwnComment: boolean
      onEdit: (id: string, comment: string, html: string) => Promise<void>
      onDelete: (id: string) => Promise<void>
    behavior:
      - State change: "changed state from {old} to {new}"
      - Assignment: "assigned to {name}" / "unassigned"
      - Comment: rich text display with edit/delete actions
      - AI indicator for is_ai_generated entries

  CommentInput:
    path: frontend/src/features/issues/components/comment-input.tsx
    status: NEW
    description: Rich text input for adding comments
    props:
      onSubmit: (comment: string, html: string) => Promise<void>
      disabled: boolean (optional)
    behavior:
      - TipTap mini editor (StarterKit + Mention + CodeBlock)
      - Enter to submit, Shift+Enter for newline
      - Clear after submit

  # ============================================================
  # SIDEBAR COMPONENTS
  # ============================================================
  IssuePropertiesPanel:
    path: frontend/src/features/issues/components/issue-properties-panel.tsx
    status: NEW
    description: Right sidebar with all editable properties
    props:
      issue: Issue
      workspaceId: string
      workspaceSlug: string
      members: UserSummary[]
      labels: Label[]
      cycles: CycleSummary[]
      onUpdate: (field: string, value: unknown) => Promise<void>
    children:
      - IssueStateSelect (existing)
      - IssuePrioritySelect (existing)
      - IssueTypeSelect (NEW)
      - AssigneeSelector (existing)
      - LabelSelector (existing)
      - CycleSelector (NEW)
      - EstimateSelector (NEW)
      - DatePicker (shadcn/ui)
      - LinkedPRsList (NEW)
      - SourceNotesList (NEW)
      - IssueMetadata (timestamps, read-only)

  IssueTypeSelect:
    path: frontend/src/components/issues/IssueTypeSelect.tsx
    status: NEW
    description: Dropdown for issue type selection
    props:
      value: IssueType
      onChange: (type: IssueType) => void
      className: string (optional)

  CycleSelector:
    path: frontend/src/components/issues/CycleSelector.tsx
    status: NEW
    description: Dropdown for cycle assignment
    props:
      value: string | null (cycleId)
      cycles: CycleSummary[]
      onChange: (cycleId: string | null) => void
      className: string (optional)

  EstimateSelector:
    path: frontend/src/components/issues/EstimateSelector.tsx
    status: NEW
    description: Fibonacci story point selector
    props:
      value: number | null
      onChange: (points: number | null) => void
      className: string (optional)
    behavior:
      - Preset buttons: 1, 2, 3, 5, 8, 13
      - Custom input option

  LinkedPRsList:
    path: frontend/src/features/issues/components/linked-prs-list.tsx
    status: NEW
    description: List of linked GitHub PRs in sidebar
    props:
      links: IntegrationLink[]
    behavior:
      - Filter to type='github_pr'
      - Status badge colors: Open (blue), Merged (purple), Closed (grey)
      - Click opens external URL in new tab
      - Empty state: "No linked pull requests"

  SourceNotesList:
    path: frontend/src/features/issues/components/source-notes-list.tsx
    status: NEW
    description: List of linked notes in sidebar
    props:
      links: NoteIssueLink[]
      workspaceSlug: string
    behavior:
      - Link type badge (EXTRACTED/CREATED/REFERENCED)
      - Click navigates to note editor
      - Empty state: "No linked notes"

  # ============================================================
  # SHARED UTILITY COMPONENTS
  # ============================================================
  SaveStatus:
    path: frontend/src/components/ui/save-status.tsx
    status: NEW
    description: Inline save status indicator
    props:
      status: 'idle' | 'saving' | 'saved' | 'error'
      errorMessage: string (optional)
    behavior:
      - "Saving..." text when saving
      - "Saved" text that fades after 2 seconds
      - Error text in destructive color
      - Accessible: aria-live="polite"

# ============================================================
# TanStack Query Hooks (NEW)
# ============================================================
hooks:
  useIssueDetail:
    path: frontend/src/features/issues/hooks/use-issue-detail.ts
    query_key: ['issues', issueId]
    fetcher: issuesApi.get(workspaceId, issueId)
    stale_time: 30000 # 30s

  useUpdateIssue:
    path: frontend/src/features/issues/hooks/use-update-issue.ts
    mutation: issuesApi.update(workspaceId, issueId, data)
    optimistic: true (onMutate snapshot + rollback)
    invalidates: ['issues', issueId]

  useActivities:
    path: frontend/src/features/issues/hooks/use-activities.ts
    type: useInfiniteQuery
    query_key: ['issues', issueId, 'activities']
    fetcher: issuesApi.listActivities(workspaceId, issueId, cursor)
    page_size: 50

  useAddComment:
    path: frontend/src/features/issues/hooks/use-add-comment.ts
    mutation: issuesApi.addComment(workspaceId, issueId, data)
    optimistic: true
    invalidates: ['issues', issueId, 'activities']

  useEditComment:
    path: frontend/src/features/issues/hooks/use-edit-comment.ts
    mutation: issuesApi.editComment(workspaceId, issueId, commentId, data)
    optimistic: true
    invalidates: ['issues', issueId, 'activities']

  useDeleteComment:
    path: frontend/src/features/issues/hooks/use-delete-comment.ts
    mutation: issuesApi.deleteComment(workspaceId, issueId, commentId)
    optimistic: true
    invalidates: ['issues', issueId, 'activities']

  useWorkspaceCycles:
    path: frontend/src/features/issues/hooks/use-workspace-cycles.ts
    query_key: ['workspaces', workspaceId, 'cycles']
    fetcher: cyclesApi.list(workspaceId)
    stale_time: 60000 # 1 min
