openapi: 3.1.0
info:
  title: Pilot Space API
  description: |
    AI-augmented SDLC platform API for project management with intelligent features.

    ## Authentication
    All endpoints require Bearer token authentication via Supabase Auth (GoTrue).
    Authorization is enforced via Row-Level Security (RLS) policies.

    ## Rate Limits
    - Standard endpoints: 1000 requests/minute per workspace
    - AI endpoints: 100 requests/minute per workspace (subject to LLM provider limits)
    - Webhook endpoints: 500 requests/minute

    ## Pagination
    List endpoints support cursor-based pagination using `cursor` and `limit` parameters.
    Response format: `{ data: [...], meta: { total, cursor, hasMore } }`

    ## Updated
    Session 2026-01-22: Migrated to Supabase platform
  version: 2.0.0
  contact:
    name: Pilot Space Team
    url: https://pilot-space.com
  license:
    name: MIT

servers:
  - url: https://api.pilot-space.com/api/v1
    description: Production
  - url: http://localhost:8000/api/v1
    description: Development

tags:
  - name: Auth
    description: Authentication endpoints
  - name: Workspaces
    description: Workspace management
  - name: Projects
    description: Project management
  - name: Notes
    description: Note canvas and AI-assisted note operations
  - name: Issues
    description: Issue management with AI enhancements
  - name: AI
    description: AI feature endpoints
  - name: Cycles
    description: Sprint/cycle management
  - name: Modules
    description: Epic/module management
  - name: Pages
    description: Documentation pages
  - name: Integrations
    description: GitHub and Slack integrations
  - name: Webhooks
    description: Webhook management

paths:
  # ============================================================================
  # Authentication (Supabase Auth)
  # ============================================================================
  /auth/login:
    post:
      tags: [Auth]
      summary: Login with Supabase Auth
      description: |
        Authenticate via email/password or OAuth provider.
        For OAuth, redirects to provider and returns via callback.
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  properties:
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                  required: [email, password]
                - type: object
                  properties:
                    provider:
                      type: string
                      enum: [google, github, azure]
                    redirect_to:
                      type: string
                      format: uri
                  required: [provider]
      responses:
        "200":
          description: Login successful (email/password)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "302":
          description: Redirect to OAuth provider

  /auth/callback:
    get:
      tags: [Auth]
      summary: OAuth callback handler
      operationId: handleOAuthCallback
      description: Handles redirect from OAuth provider (Google, GitHub, Azure)
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
      responses:
        "302":
          description: Redirect to app with session

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      operationId: refreshToken
      security:
        - bearerAuth: []
      responses:
        "200":
          description: New tokens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ============================================================================
  # Workspaces
  # ============================================================================
  /workspaces:
    get:
      tags: [Workspaces]
      summary: List user's workspaces
      operationId: listWorkspaces
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of workspaces
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workspace"

    post:
      tags: [Workspaces]
      summary: Create workspace
      operationId: createWorkspace
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
      responses:
        "201":
          description: Created workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"

  /workspaces/{workspaceSlug}:
    parameters:
      - $ref: "#/components/parameters/workspaceSlug"
    get:
      tags: [Workspaces]
      summary: Get workspace by slug
      operationId: getWorkspace
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Workspace details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"

    patch:
      tags: [Workspaces]
      summary: Update workspace
      operationId: updateWorkspace
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkspaceRequest"
      responses:
        "200":
          description: Updated workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"

  /workspaces/{workspaceSlug}/members:
    parameters:
      - $ref: "#/components/parameters/workspaceSlug"
    get:
      tags: [Workspaces]
      summary: List workspace members
      operationId: listWorkspaceMembers
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceMember"

    post:
      tags: [Workspaces]
      summary: Invite member to workspace
      operationId: inviteWorkspaceMember
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteMemberRequest"
      responses:
        "201":
          description: Member invited

  # ============================================================================
  # Projects
  # ============================================================================
  /workspaces/{workspaceSlug}/projects:
    parameters:
      - $ref: "#/components/parameters/workspaceSlug"
    get:
      tags: [Projects]
      summary: List projects in workspace
      operationId: listProjects
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"

    post:
      tags: [Projects]
      summary: Create project
      operationId: createProject
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /workspaces/{workspaceSlug}/projects/{projectId}:
    parameters:
      - $ref: "#/components/parameters/workspaceSlug"
      - $ref: "#/components/parameters/projectId"
    get:
      tags: [Projects]
      summary: Get project
      operationId: getProject
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  # ============================================================================
  # Notes
  # ============================================================================
  /workspaces/{workspaceSlug}/notes:
    parameters:
      - $ref: "#/components/parameters/workspaceSlug"
    get:
      tags: [Notes]
      summary: List notes in workspace
      operationId: listNotes
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: query
          schema:
            type: string
            format: uuid
        - name: isPinned
          in: query
          schema:
            type: boolean
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: List of notes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedNotes"

    post:
      tags: [Notes]
      summary: Create note
      operationId: createNote
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoteRequest"
      responses:
        "201":
          description: Created note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"

  /workspaces/{workspaceSlug}/notes/{noteId}:
    parameters:
      - $ref: "#/components/parameters/workspaceSlug"
      - $ref: "#/components/parameters/noteId"
    get:
      tags: [Notes]
      summary: Get note with content
      operationId: getNote
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Note with full content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteDetail"

    patch:
      tags: [Notes]
      summary: Update note
      operationId: updateNote
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNoteRequest"
      responses:
        "200":
          description: Updated note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteDetail"

    delete:
      tags: [Notes]
      summary: Delete note (soft delete)
      operationId: deleteNote
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Note deleted

  /workspaces/{workspaceSlug}/notes/{noteId}/ghost-text:
    parameters:
      - $ref: "#/components/parameters/workspaceSlug"
      - $ref: "#/components/parameters/noteId"
    get:
      tags: [Notes, AI]
      summary: Stream ghost text suggestions (SSE)
      description: |
        Returns Server-Sent Events stream with AI-generated text suggestions.
        Client should send cursor position and surrounding context.
      operationId: streamGhostText
      security:
        - bearerAuth: []
      parameters:
        - name: cursorPosition
          in: query
          required: true
          schema:
            type: integer
        - name: context
          in: query
          required: true
          description: Text around cursor (500 chars before, 200 after)
          schema:
            type: string
            maxLength: 700
      responses:
        "200":
          description: SSE stream of ghost text
          content:
            text/event-stream:
              schema:
                type: string

  /workspaces/{workspaceSlug}/notes/{noteId}/annotations:
    parameters:
      - $ref: "#/components/parameters/workspaceSlug"
      - $ref: "#/components/parameters/noteId"
    get:
      tags: [Notes]
      summary: Get note annotations
      operationId: getNoteAnnotations
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of annotations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NoteAnnotation"

  /workspaces/{workspaceSlug}/notes/{noteId}/annotations/{annotationId}/accept:
    parameters:
      - $ref: "#/components/parameters/workspaceSlug"
      - $ref: "#/components/parameters/noteId"
      - name: annotationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [Notes]
      summary: Accept annotation suggestion
      operationId: acceptAnnotation
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Annotation accepted

  /workspaces/{workspaceSlug}/notes/{noteId}/annotations/{annotationId}/dismiss:
    parameters:
      - $ref: "#/components/parameters/workspaceSlug"
      - $ref: "#/components/parameters/noteId"
      - name: annotationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [Notes]
      summary: Dismiss annotation
      operationId: dismissAnnotation
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Annotation dismissed

  /workspaces/{workspaceSlug}/notes/{noteId}/extract-issue:
    parameters:
      - $ref: "#/components/parameters/workspaceSlug"
      - $ref: "#/components/parameters/noteId"
    post:
      tags: [Notes, AI]
      summary: Extract issue from selected text
      operationId: extractIssueFromNote
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractIssueRequest"
      responses:
        "201":
          description: Issue extracted and linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue"

  /workspaces/{workspaceSlug}/notes/{noteId}/discussions:
    parameters:
      - $ref: "#/components/parameters/workspaceSlug"
      - $ref: "#/components/parameters/noteId"
    get:
      tags: [Notes]
      summary: Get threaded discussions
      operationId: getNoteDiscussions
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of discussions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ThreadedDiscussion"

    post:
      tags: [Notes]
      summary: Start new discussion thread
      operationId: createDiscussion
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDiscussionRequest"
      responses:
        "201":
          description: Discussion created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreadedDiscussion"

  # ============================================================================
  # Issues
  # ============================================================================
  /workspaces/{workspaceSlug}/projects/{projectId}/issues:
    parameters:
      - $ref: "#/components/parameters/workspaceSlug"
      - $ref: "#/components/parameters/projectId"
    get:
      tags: [Issues]
      summary: List issues in project
      operationId: listIssues
      security:
        - bearerAuth: []
      parameters:
        - name: state
          in: query
          schema:
            type: string
            format: uuid
        - name: priority
          in: query
          schema:
            $ref: "#/components/schemas/Priority"
        - name: assigneeId
          in: query
          schema:
            type: string
            format: uuid
        - name: cycleId
          in: query
          schema:
            type: string
            format: uuid
        - name: moduleId
          in: query
          schema:
            type: string
            format: uuid
        - name: labels
          in: query
          schema:
            type: array
            items:
              type: string
              format: uuid
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: List of issues
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedIssues"

    post:
      tags: [Issues]
      summary: Create issue
      operationId: createIssue
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIssueRequest"
      responses:
        "201":
          description: Created issue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue"

  /workspaces/{workspaceSlug}/projects/{projectId}/issues/{issueId}:
    parameters:
      - $ref: "#/components/parameters/workspaceSlug"
      - $ref: "#/components/parameters/projectId"
      - $ref: "#/components/parameters/issueId"
    get:
      tags: [Issues]
      summary: Get issue detail
      operationId: getIssue
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Issue details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueDetail"

    patch:
      tags: [Issues]
      summary: Update issue
      operationId: updateIssue
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIssueRequest"
      responses:
        "200":
          description: Updated issue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueDetail"

    delete:
      tags: [Issues]
      summary: Delete issue (soft delete)
      operationId: deleteIssue
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Issue deleted

  /workspaces/{workspaceSlug}/projects/{projectId}/issues/{issueId}/activities:
    parameters:
      - $ref: "#/components/parameters/workspaceSlug"
      - $ref: "#/components/parameters/projectId"
      - $ref: "#/components/parameters/issueId"
    get:
      tags: [Issues]
      summary: Get issue activity log
      operationId: getIssueActivities
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Activity log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedActivities"

  /workspaces/{workspaceSlug}/projects/{projectId}/issues/{issueId}/ai-context:
    parameters:
      - $ref: "#/components/parameters/workspaceSlug"
      - $ref: "#/components/parameters/projectId"
      - $ref: "#/components/parameters/issueId"
    get:
      tags: [Issues, AI]
      summary: Get AI context for issue
      description: Returns aggregated context including related issues, documents, code files, and generated tasks
      operationId: getIssueAIContext
      security:
        - bearerAuth: []
      responses:
        "200":
          description: AI context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIContext"

    post:
      tags: [Issues, AI]
      summary: Regenerate AI context
      operationId: regenerateAIContext
      security:
        - bearerAuth: []
      responses:
        "202":
          description: Context regeneration started
          content:
            application/json:
              schema:
                type: object
                properties:
                  taskId:
                    type: string
                    format: uuid

  /workspaces/{workspaceSlug}/projects/{projectId}/issues/{issueId}/ai-context/chat:
    parameters:
      - $ref: "#/components/parameters/workspaceSlug"
      - $ref: "#/components/parameters/projectId"
      - $ref: "#/components/parameters/issueId"
    post:
      tags: [Issues, AI]
      summary: Refine AI context via chat
      description: Send message to refine context (e.g., "Focus on API layer only")
      operationId: chatWithAIContext
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  maxLength: 1000
      responses:
        "200":
          description: Updated context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIContext"

  /workspaces/{workspaceSlug}/projects/{projectId}/issues/{issueId}/ai-context/export:
    parameters:
      - $ref: "#/components/parameters/workspaceSlug"
      - $ref: "#/components/parameters/projectId"
      - $ref: "#/components/parameters/issueId"
    get:
      tags: [Issues, AI]
      summary: Export AI context as markdown
      description: Returns complete context in markdown format for Claude Code
      operationId: exportAIContext
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Markdown export
          content:
            text/markdown:
              schema:
                type: string

  # ============================================================================
  # AI Endpoints
  # ============================================================================
  /workspaces/{workspaceSlug}/ai/enhance-issue:
    parameters:
      - $ref: "#/components/parameters/workspaceSlug"
    post:
      tags: [AI]
      summary: AI-enhance issue content
      description: Suggest title improvements, expand description, suggest labels/priority
      operationId: enhanceIssue
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnhanceIssueRequest"
      responses:
        "200":
          description: Enhancement suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueEnhancement"

  /workspaces/{workspaceSlug}/ai/detect-duplicates:
    parameters:
      - $ref: "#/components/parameters/workspaceSlug"
    post:
      tags: [AI]
      summary: Detect potential duplicate issues
      operationId: detectDuplicates
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, description]
              properties:
                title:
                  type: string
                description:
                  type: string
                projectId:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Potential duplicates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DuplicateCandidate"

  /workspaces/{workspaceSlug}/ai/decompose-task:
    parameters:
      - $ref: "#/components/parameters/workspaceSlug"
    post:
      tags: [AI]
      summary: Decompose feature into tasks
      operationId: decomposeTask
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecomposeTaskRequest"
      responses:
        "200":
          description: Task breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskDecomposition"

  /workspaces/{workspaceSlug}/ai/generate-diagram:
    parameters:
      - $ref: "#/components/parameters/workspaceSlug"
    post:
      tags: [AI]
      summary: Generate diagram from description
      operationId: generateDiagram
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateDiagramRequest"
      responses:
        "200":
          description: Generated diagram code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagramResult"

  /workspaces/{workspaceSlug}/ai/generate-docs:
    parameters:
      - $ref: "#/components/parameters/workspaceSlug"
    post:
      tags: [AI]
      summary: Generate documentation
      operationId: generateDocs
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateDocsRequest"
      responses:
        "202":
          description: Documentation generation started
          content:
            application/json:
              schema:
                type: object
                properties:
                  taskId:
                    type: string
                    format: uuid

  /workspaces/{workspaceSlug}/ai/search:
    parameters:
      - $ref: "#/components/parameters/workspaceSlug"
    post:
      tags: [AI]
      summary: Semantic search across workspace
      operationId: semanticSearch
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                  maxLength: 500
                entityTypes:
                  type: array
                  items:
                    type: string
                    enum: [note, issue, page, code]
                projectId:
                  type: string
                  format: uuid
                limit:
                  type: integer
                  default: 20
                  maximum: 100
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

  # ============================================================================
  # Cycles
  # ============================================================================
  /workspaces/{workspaceSlug}/projects/{projectId}/cycles:
    parameters:
      - $ref: "#/components/parameters/workspaceSlug"
      - $ref: "#/components/parameters/projectId"
    get:
      tags: [Cycles]
      summary: List cycles
      operationId: listCycles
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of cycles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Cycle"

    post:
      tags: [Cycles]
      summary: Create cycle
      operationId: createCycle
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCycleRequest"
      responses:
        "201":
          description: Created cycle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cycle"

  # ============================================================================
  # Modules
  # ============================================================================
  /workspaces/{workspaceSlug}/projects/{projectId}/modules:
    parameters:
      - $ref: "#/components/parameters/workspaceSlug"
      - $ref: "#/components/parameters/projectId"
    get:
      tags: [Modules]
      summary: List modules
      operationId: listModules
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of modules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Module"

    post:
      tags: [Modules]
      summary: Create module
      operationId: createModule
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateModuleRequest"
      responses:
        "201":
          description: Created module
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Module"

  # ============================================================================
  # Integrations
  # ============================================================================
  /workspaces/{workspaceSlug}/integrations/github:
    parameters:
      - $ref: "#/components/parameters/workspaceSlug"
    get:
      tags: [Integrations]
      summary: Get GitHub integration status
      operationId: getGitHubIntegration
      security:
        - bearerAuth: []
      responses:
        "200":
          description: GitHub integration status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitHubIntegration"

  /workspaces/{workspaceSlug}/integrations/github/install:
    parameters:
      - $ref: "#/components/parameters/workspaceSlug"
    post:
      tags: [Integrations]
      summary: Install GitHub App
      operationId: installGitHubApp
      security:
        - bearerAuth: []
      responses:
        "302":
          description: Redirect to GitHub App installation

  /workspaces/{workspaceSlug}/integrations/slack:
    parameters:
      - $ref: "#/components/parameters/workspaceSlug"
    get:
      tags: [Integrations]
      summary: Get Slack integration status
      operationId: getSlackIntegration
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Slack integration status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlackIntegration"

  /workspaces/{workspaceSlug}/integrations/slack/install:
    parameters:
      - $ref: "#/components/parameters/workspaceSlug"
    post:
      tags: [Integrations]
      summary: Install Slack App
      operationId: installSlackApp
      security:
        - bearerAuth: []
      responses:
        "302":
          description: Redirect to Slack OAuth

  # ============================================================================
  # Webhooks (Inbound)
  # ============================================================================
  /webhooks/github:
    post:
      tags: [Webhooks]
      summary: GitHub webhook handler
      operationId: handleGitHubWebhook
      security: []
      parameters:
        - name: X-GitHub-Event
          in: header
          required: true
          schema:
            type: string
        - name: X-Hub-Signature-256
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Webhook processed

  /webhooks/slack:
    post:
      tags: [Webhooks]
      summary: Slack event handler
      operationId: handleSlackWebhook
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Event processed

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    workspaceSlug:
      name: workspaceSlug
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-z0-9-]+$"

    projectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    noteId:
      name: noteId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    issueId:
      name: issueId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    cursor:
      name: cursor
      in: query
      schema:
        type: string

    limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 50
        maximum: 100

  schemas:
    # ==================== Base Types ====================
    Priority:
      type: string
      enum: [urgent, high, medium, low, none]

    StateGroup:
      type: string
      enum: [backlog, unstarted, started, completed, cancelled]

    # ==================== User ====================
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        avatarUrl:
          type: string
          format: uri
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    TokenResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer

    # ==================== Workspace ====================
    Workspace:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        logoUrl:
          type: string
          format: uri
        owner:
          $ref: "#/components/schemas/User"
        settings:
          type: object
        createdAt:
          type: string
          format: date-time

    CreateWorkspaceRequest:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        slug:
          type: string
          pattern: "^[a-z0-9-]+$"
          minLength: 3
          maxLength: 50
        description:
          type: string

    UpdateWorkspaceRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        settings:
          type: object

    WorkspaceMember:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user:
          $ref: "#/components/schemas/User"
        role:
          type: string
          enum: [owner, admin, member, guest]
        joinedAt:
          type: string
          format: date-time

    InviteMemberRequest:
      type: object
      required: [email, role]
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, member, guest]

    # ==================== Project ====================
    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        identifier:
          type: string
        description:
          type: string
        emoji:
          type: string
        coverImageUrl:
          type: string
          format: uri
        isPublic:
          type: boolean
        issueCount:
          type: integer
        settings:
          type: object
        createdAt:
          type: string
          format: date-time

    CreateProjectRequest:
      type: object
      required: [name, identifier]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        identifier:
          type: string
          pattern: "^[A-Z0-9]+$"
          minLength: 2
          maxLength: 10
        description:
          type: string
        emoji:
          type: string
        isPublic:
          type: boolean
          default: false

    # ==================== Note ====================
    Note:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        emoji:
          type: string
        projectId:
          type: string
          format: uuid
        isPinned:
          type: boolean
        syncState:
          type: string
          enum: [draft, synced, conflict]
        createdBy:
          $ref: "#/components/schemas/User"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    NoteDetail:
      allOf:
        - $ref: "#/components/schemas/Note"
        - type: object
          properties:
            content:
              type: object
              description: TipTap/ProseMirror JSON content
            annotations:
              type: array
              items:
                $ref: "#/components/schemas/NoteAnnotation"
            linkedIssues:
              type: array
              items:
                $ref: "#/components/schemas/IssueLink"

    CreateNoteRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        emoji:
          type: string
        projectId:
          type: string
          format: uuid
        templateId:
          type: string
          format: uuid
        content:
          type: object

    UpdateNoteRequest:
      type: object
      properties:
        title:
          type: string
        emoji:
          type: string
        content:
          type: object
        isPinned:
          type: boolean

    NoteAnnotation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        blockId:
          type: string
        annotationType:
          type: string
          enum: [suggestion, issue_candidate, warning, linked_issue, comment]
        content:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
        metadata:
          type: object
        isDismissed:
          type: boolean
        isAccepted:
          type: boolean
        createdAt:
          type: string
          format: date-time

    PaginatedNotes:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Note"
        cursor:
          type: string
        hasMore:
          type: boolean

    ExtractIssueRequest:
      type: object
      required: [blockId, selectedText]
      properties:
        blockId:
          type: string
        selectedText:
          type: string
        projectId:
          type: string
          format: uuid

    ThreadedDiscussion:
      type: object
      properties:
        id:
          type: string
          format: uuid
        blockId:
          type: string
        isResolved:
          type: boolean
        comments:
          type: array
          items:
            $ref: "#/components/schemas/DiscussionComment"
        createdAt:
          type: string
          format: date-time

    DiscussionComment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        content:
          type: string
        author:
          $ref: "#/components/schemas/User"
        isEdited:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CreateDiscussionRequest:
      type: object
      required: [blockId, content]
      properties:
        blockId:
          type: string
        content:
          type: string

    # ==================== Issue ====================
    Issue:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sequenceId:
          type: integer
        identifier:
          type: string
          description: "Project identifier + sequence (e.g., PS-123)"
        name:
          type: string
        description:
          type: string
        state:
          $ref: "#/components/schemas/State"
        priority:
          $ref: "#/components/schemas/Priority"
        assignee:
          $ref: "#/components/schemas/User"
        reporter:
          $ref: "#/components/schemas/User"
        labels:
          type: array
          items:
            $ref: "#/components/schemas/Label"
        estimatePoints:
          type: integer
        startDate:
          type: string
          format: date
        targetDate:
          type: string
          format: date
        cycleId:
          type: string
          format: uuid
        moduleId:
          type: string
          format: uuid
        parentId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    IssueDetail:
      allOf:
        - $ref: "#/components/schemas/Issue"
        - type: object
          properties:
            descriptionHtml:
              type: string
            subIssues:
              type: array
              items:
                $ref: "#/components/schemas/Issue"
            integrationLinks:
              type: array
              items:
                $ref: "#/components/schemas/IntegrationLink"
            noteLinks:
              type: array
              items:
                $ref: "#/components/schemas/NoteLink"
            aiMetadata:
              type: object

    IssueLink:
      type: object
      properties:
        issueId:
          type: string
          format: uuid
        identifier:
          type: string
        name:
          type: string
        state:
          $ref: "#/components/schemas/State"

    NoteLink:
      type: object
      properties:
        noteId:
          type: string
          format: uuid
        title:
          type: string
        blockId:
          type: string

    CreateIssueRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
        stateId:
          type: string
          format: uuid
        priority:
          $ref: "#/components/schemas/Priority"
        assigneeId:
          type: string
          format: uuid
        labelIds:
          type: array
          items:
            type: string
            format: uuid
        estimatePoints:
          type: integer
        startDate:
          type: string
          format: date
        targetDate:
          type: string
          format: date
        cycleId:
          type: string
          format: uuid
        moduleId:
          type: string
          format: uuid
        parentId:
          type: string
          format: uuid

    UpdateIssueRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        stateId:
          type: string
          format: uuid
        priority:
          $ref: "#/components/schemas/Priority"
        assigneeId:
          type: string
          format: uuid
        labelIds:
          type: array
          items:
            type: string
            format: uuid
        estimatePoints:
          type: integer
        startDate:
          type: string
          format: date
        targetDate:
          type: string
          format: date
        cycleId:
          type: string
          format: uuid
        moduleId:
          type: string
          format: uuid

    PaginatedIssues:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Issue"
        cursor:
          type: string
        hasMore:
          type: boolean

    State:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        color:
          type: string
        group:
          $ref: "#/components/schemas/StateGroup"

    Label:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        color:
          type: string

    IntegrationLink:
      type: object
      properties:
        id:
          type: string
          format: uuid
        integrationType:
          type: string
          enum: [github]
        linkType:
          type: string
          enum: [pr, commit, branch]
        externalId:
          type: string
        externalUrl:
          type: string
          format: uri
        metadata:
          type: object

    Activity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        verb:
          type: string
        field:
          type: string
        oldValue:
          type: string
        newValue:
          type: string
        comment:
          type: string
        commentHtml:
          type: string
        actor:
          $ref: "#/components/schemas/User"
        isAiGenerated:
          type: boolean
        createdAt:
          type: string
          format: date-time

    PaginatedActivities:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Activity"
        cursor:
          type: string
        hasMore:
          type: boolean

    # ==================== AI ====================
    AIContext:
      type: object
      properties:
        id:
          type: string
          format: uuid
        summary:
          type: string
        relatedIssues:
          type: array
          items:
            type: object
            properties:
              issueId:
                type: string
                format: uuid
              identifier:
                type: string
              name:
                type: string
              relation:
                type: string
                enum: [blocks, blocked_by, relates_to, duplicates]
              similarity:
                type: number
        documents:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              type:
                type: string
                enum: [note, page]
              title:
                type: string
              relevance:
                type: number
        codebaseFiles:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              relevance:
                type: number
              functions:
                type: array
                items:
                  type: string
        gitReferences:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [pr, commit, branch]
              number:
                type: integer
              title:
                type: string
              status:
                type: string
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/AITask"
        taskDependencies:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        generatedAt:
          type: string
          format: date-time
        modelUsed:
          type: string

    AITask:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [bug_fix, feature, refactor, test, docs]
        dependencies:
          type: array
          items:
            type: string
        prompt:
          type: string
          description: Ready-to-use prompt for Claude Code

    EnhanceIssueRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
        description:
          type: string
        projectId:
          type: string
          format: uuid

    IssueEnhancement:
      type: object
      properties:
        enhancedTitle:
          type: object
          properties:
            text:
              type: string
            confidence:
              type: number
        expandedDescription:
          type: object
          properties:
            text:
              type: string
            confidence:
              type: number
        suggestedLabels:
          type: array
          items:
            type: object
            properties:
              labelId:
                type: string
                format: uuid
              name:
                type: string
              confidence:
                type: number
        suggestedPriority:
          type: object
          properties:
            priority:
              $ref: "#/components/schemas/Priority"
            confidence:
              type: number
        suggestedAssignee:
          type: object
          properties:
            userId:
              type: string
              format: uuid
            displayName:
              type: string
            confidence:
              type: number
            reason:
              type: string

    DuplicateCandidate:
      type: object
      properties:
        issueId:
          type: string
          format: uuid
        identifier:
          type: string
        name:
          type: string
        similarity:
          type: number
        state:
          $ref: "#/components/schemas/State"

    DecomposeTaskRequest:
      type: object
      required: [description]
      properties:
        description:
          type: string
          maxLength: 5000
        projectId:
          type: string
          format: uuid
        templateType:
          type: string
          enum: [bug_fix, feature, refactor]
          default: feature

    TaskDecomposition:
      type: object
      properties:
        tasks:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
              description:
                type: string
              acceptanceCriteria:
                type: array
                items:
                  type: string
              estimatePoints:
                type: integer
              category:
                type: string
                enum: [frontend, backend, database, testing, documentation]
              dependencies:
                type: array
                items:
                  type: integer
        dependencyGraph:
          type: object
        risks:
          type: array
          items:
            type: object
            properties:
              description:
                type: string
              mitigation:
                type: string

    GenerateDiagramRequest:
      type: object
      required: [description]
      properties:
        description:
          type: string
          maxLength: 2000
        diagramType:
          type: string
          enum: [sequence, class, erd, flowchart, state, c4_context, c4_container, c4_component]
          default: sequence
        format:
          type: string
          enum: [mermaid, plantuml, c4_plantuml]
          default: mermaid

    DiagramResult:
      type: object
      properties:
        code:
          type: string
        format:
          type: string
        previewUrl:
          type: string
          format: uri

    GenerateDocsRequest:
      type: object
      required: [sourceType]
      properties:
        sourceType:
          type: string
          enum: [code, issue, page]
        sourceId:
          type: string
          format: uuid
        sourcePath:
          type: string
          description: For code sources, the file/directory path
        docType:
          type: string
          enum: [api, architecture, component, adr, release_notes, onboarding]
          default: component

    SearchResults:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              entityType:
                type: string
                enum: [note, issue, page, code]
              entityId:
                type: string
                format: uuid
              title:
                type: string
              snippet:
                type: string
              relevance:
                type: number
              projectId:
                type: string
                format: uuid
        query:
          type: string
        totalCount:
          type: integer

    # ==================== Cycles ====================
    Cycle:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        status:
          type: string
          enum: [upcoming, current, completed]
        issueCount:
          type: integer
        completedIssueCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    CreateCycleRequest:
      type: object
      required: [name, startDate, endDate]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date

    # ==================== Modules ====================
    Module:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [backlog, planned, in_progress, paused, completed, cancelled]
        startDate:
          type: string
          format: date
        targetDate:
          type: string
          format: date
        lead:
          $ref: "#/components/schemas/User"
        issueCount:
          type: integer
        completedIssueCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    CreateModuleRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
        status:
          type: string
          enum: [backlog, planned, in_progress]
          default: backlog
        startDate:
          type: string
          format: date
        targetDate:
          type: string
          format: date
        leadId:
          type: string
          format: uuid
        parentId:
          type: string
          format: uuid

    # ==================== Integrations ====================
    GitHubIntegration:
      type: object
      properties:
        isActive:
          type: boolean
        installationId:
          type: integer
        connectedBy:
          $ref: "#/components/schemas/User"
        connectedAt:
          type: string
          format: date-time
        repositories:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              fullName:
                type: string
              linkedProjectId:
                type: string
                format: uuid

    SlackIntegration:
      type: object
      properties:
        isActive:
          type: boolean
        teamId:
          type: string
        teamName:
          type: string
        connectedBy:
          $ref: "#/components/schemas/User"
        connectedAt:
          type: string
          format: date-time
        channels:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              linkedProjectId:
                type: string
                format: uuid
