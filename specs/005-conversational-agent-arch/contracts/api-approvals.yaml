# OpenAPI Contract: AI Approval Endpoints
# Human-in-the-loop approval workflow per DD-003

openapi: 3.1.0
info:
  title: PilotSpace AI Approvals API
  version: 1.0.0
  description: Human-in-the-loop approval workflow for critical AI actions

paths:
  /api/v1/ai/approvals:
    get:
      operationId: listPendingApprovals
      summary: List pending approval requests
      description: |
        Get all pending approval requests for the authenticated user.
        Returns requests ordered by urgency (high → medium → low) and creation time.
      tags:
        - AI Approvals
      security:
        - bearerAuth: []
      parameters:
        - name: workspace_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter by workspace
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, all]
            default: pending
          description: Filter by status
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: List of approval requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /api/v1/ai/approvals/{request_id}:
    get:
      operationId: getApprovalRequest
      summary: Get approval request details
      description: Get full details of a specific approval request
      tags:
        - AI Approvals
      security:
        - bearerAuth: []
      parameters:
        - name: request_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Approval request details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalRequest'
        '404':
          description: Request not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /api/v1/ai/approvals/{request_id}/approve:
    post:
      operationId: approveRequest
      summary: Approve an action
      description: |
        Approve the AI's proposed action. Optionally modify the content before approval.
        Once approved, the action will be executed immediately.
      tags:
        - AI Approvals
      security:
        - bearerAuth: []
      parameters:
        - name: request_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproveRequest'
      responses:
        '200':
          description: Action approved and executed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalResponse'
        '400':
          description: Request already resolved or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: Request not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /api/v1/ai/approvals/{request_id}/reject:
    post:
      operationId: rejectRequest
      summary: Reject an action
      description: |
        Reject the AI's proposed action. Optionally provide a reason.
        The AI will be notified of the rejection and can suggest alternatives.
      tags:
        - AI Approvals
      security:
        - bearerAuth: []
      parameters:
        - name: request_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectRequest'
      responses:
        '200':
          description: Action rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalResponse'
        '400':
          description: Request already resolved or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: Request not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApprovalListResponse:
      type: object
      required:
        - items
        - total
        - has_more
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ApprovalRequestSummary'
        total:
          type: integer
          description: Total count of matching requests
        has_more:
          type: boolean
          description: Whether more items exist beyond this page

    ApprovalRequestSummary:
      type: object
      required:
        - id
        - action_type
        - description
        - urgency
        - status
        - created_at
        - expires_at
      properties:
        id:
          type: string
          format: uuid
        action_type:
          type: string
          enum:
            - create_issue
            - modify_file
            - delete_entity
            - bulk_operation
            - external_api_call
        description:
          type: string
          description: Brief action description
        urgency:
          type: string
          enum: [low, medium, high]
        status:
          type: string
          enum: [pending, approved, rejected, expired, modified]
        affected_count:
          type: integer
          description: Number of affected entities
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        time_remaining_seconds:
          type: integer
          description: Seconds until expiry (null if not pending)
          nullable: true

    ApprovalRequest:
      type: object
      required:
        - id
        - message_id
        - user_id
        - action_type
        - description
        - urgency
        - status
        - created_at
        - expires_at
      properties:
        id:
          type: string
          format: uuid
        message_id:
          type: string
          format: uuid
          description: Associated conversation message
        user_id:
          type: string
          format: uuid
        action_type:
          type: string
          enum:
            - create_issue
            - modify_file
            - delete_entity
            - bulk_operation
            - external_api_call
        description:
          type: string
          description: Human-readable action description
        consequences:
          type: string
          nullable: true
          description: Impact description
        affected_entities:
          type: array
          items:
            $ref: '#/components/schemas/AffectedEntity'
        urgency:
          type: string
          enum: [low, medium, high]
        status:
          type: string
          enum: [pending, approved, rejected, expired, modified]
        resolution_reason:
          type: string
          nullable: true
          description: User-provided reason (for rejection)
        proposed_content:
          type: object
          additionalProperties: true
          nullable: true
          description: AI's proposed action content
        modified_content:
          type: object
          additionalProperties: true
          nullable: true
          description: User's modifications (if approved with changes)
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time
          nullable: true

    AffectedEntity:
      type: object
      required:
        - type
        - id
        - name
      properties:
        type:
          type: string
          enum: [issue, note, file, project]
        id:
          type: string
          format: uuid
        name:
          type: string
          description: Human-readable name
        preview:
          type: object
          additionalProperties: true
          nullable: true
          description: Preview data for UI display

    ApproveRequest:
      type: object
      properties:
        modified_content:
          type: object
          additionalProperties: true
          nullable: true
          description: |
            Modified version of proposed_content.
            If provided, this will be used instead of the original proposal.
            Structure must match the original proposal's schema.

    RejectRequest:
      type: object
      properties:
        reason:
          type: string
          maxLength: 1000
          nullable: true
          description: |
            Optional reason for rejection.
            This will be communicated to the AI for learning.

    ApprovalResponse:
      type: object
      required:
        - id
        - status
        - resolved_at
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [approved, rejected, modified]
        resolved_at:
          type: string
          format: date-time
        execution_result:
          type: object
          nullable: true
          description: Result of executing the approved action
          properties:
            success:
              type: boolean
            created_entities:
              type: array
              items:
                $ref: '#/components/schemas/CreatedEntity'
            error:
              type: string
              nullable: true

    CreatedEntity:
      type: object
      required:
        - type
        - id
      properties:
        type:
          type: string
          enum: [issue, note, file]
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
          nullable: true
          description: URL to view the created entity

    ProblemDetail:
      type: object
      description: RFC 7807 Problem Details
      required:
        - type
        - title
        - status
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
          nullable: true
        instance:
          type: string
          format: uri
          nullable: true
